<script type="text/babel">
const {useState,useEffect,useCallback,useMemo,useContext,createContext,useRef} = React;

// ── Supabase client ───────────────────────────────────────────────────────────
const SUPABASE_URL='https://xrtvyidrcmakqvbxuhwr.supabase.co';
const SUPABASE_KEY='sb_publishable_Qasm0vE4Gm6m76VVOG2sww_D-f-t9fE';
const PUSH_SUBSCRIPTIONS_FN='zuppej-push-reminders';
const SEND_REMINDERS_FN='send-calendar-reminders';
const APP_ASSET_VERSION='20260428c';
const APP_BASE_URL=new URL('./',window.location.href);
const SW_URL=new URL(`sw.js?v=${APP_ASSET_VERSION}`,APP_BASE_URL).href;
const sb=window.supabase.createClient(SUPABASE_URL,SUPABASE_KEY,{
  auth:{persistSession:true,autoRefreshToken:true,detectSessionInUrl:true,
    storage:window.localStorage,storageKey:'zp_auth'}
});
function functionHeaders(token,extra={}){
  return{'apikey':SUPABASE_KEY,...(token?{Authorization:`Bearer ${token}`}:{}),...extra};
}
function urlBase64ToUint8Array(base64String){
  const padding='='.repeat((4-base64String.length%4)%4);
  const base64=(base64String+padding).replace(/-/g,'+').replace(/_/g,'/');
  const raw=atob(base64);
  return Uint8Array.from([...raw].map(c=>c.charCodeAt(0)));
}
function pushSupported(){
  return typeof window!=='undefined'&&'serviceWorker'in navigator&&'PushManager'in window&&typeof Notification!=='undefined';
}
async function getPushStatus(){
  if(!pushSupported())return{supported:false,permission:typeof Notification!=='undefined'?Notification.permission:'unsupported',subscribed:false};
  const reg=await navigator.serviceWorker.getRegistration();
  const sub=reg?await reg.pushManager.getSubscription():null;
  return{supported:true,permission:Notification.permission,subscribed:!!sub};
}
async function fetchPushConfig(token){
  const res=await fetch(`${SUPABASE_URL}/functions/v1/${PUSH_SUBSCRIPTIONS_FN}`,{
    method:'GET',
    headers:functionHeaders(token),
  });
  if(!res.ok)throw new Error('No se pudo cargar la configuración push.');
  return res.json();
}
async function registerPushSubscription(){
  if(!pushSupported())throw new Error('Este dispositivo no soporta Web Push.');
  const{data:{session}}=await sb.auth.getSession();
  if(!session)throw new Error('Necesitas iniciar sesión.');
  const permission=Notification.permission==='granted'?Notification.permission:await Notification.requestPermission();
  if(permission!=='granted')throw new Error('Permiso de notificaciones denegado.');
  const cfg=await fetchPushConfig(session.access_token);
  if(!cfg?.vapidPublicKey)throw new Error('Push no está configurado todavía en el servidor.');
  const reg=await navigator.serviceWorker.register(SW_URL);
  await navigator.serviceWorker.ready;
  let sub=await reg.pushManager.getSubscription();
  if(!sub){
    sub=await reg.pushManager.subscribe({
      userVisibleOnly:true,
      applicationServerKey:urlBase64ToUint8Array(cfg.vapidPublicKey),
    });
  }
  const res=await fetch(`${SUPABASE_URL}/functions/v1/${PUSH_SUBSCRIPTIONS_FN}`,{
    method:'POST',
    headers:functionHeaders(session.access_token,{'Content-Type':'application/json'}),
    body:JSON.stringify({subscription:sub.toJSON(),userAgent:navigator.userAgent}),
  });
  if(!res.ok)throw new Error('No se pudo guardar la suscripción push.');
  return{subscribed:true,permission};
}
async function unregisterPushSubscription(){
  if(!pushSupported())return{subscribed:false};
  const{data:{session}}=await sb.auth.getSession();
  if(!session)throw new Error('Necesitas iniciar sesión.');
  const reg=await navigator.serviceWorker.getRegistration();
  const sub=reg?await reg.pushManager.getSubscription():null;
  if(sub){
    try{
      await fetch(`${SUPABASE_URL}/functions/v1/${PUSH_SUBSCRIPTIONS_FN}`,{
        method:'DELETE',
        headers:functionHeaders(session.access_token,{'Content-Type':'application/json'}),
        body:JSON.stringify({endpoint:sub.endpoint}),
      });
    }catch{}
    try{await sub.unsubscribe();}catch{}
  }
  return{subscribed:false,permission:typeof Notification!=='undefined'?Notification.permission:'unsupported'};
}

function translateAuthError(e){
  const m=(e?.message||'').toLowerCase();
  if(!m)return'No se pudo completar la operación.';
  if(m.includes('invalid login credentials'))return'Credenciales incorrectas. Revisa tu correo y contraseña.';
  if(m.includes('user already registered')||m.includes('already been registered'))return'Esta cuenta ya existe. Inicia sesión.';
  if(m.includes('password should be at least')||m.includes('weak password'))return'La contraseña es demasiado corta o débil (mínimo 6 caracteres).';
  if(m.includes('email not confirmed'))return'Tienes que confirmar tu correo antes de iniciar sesión.';
  if(m.includes('rate limit')||m.includes('too many requests'))return'Demasiados intentos. Espera un momento e inténtalo de nuevo.';
  if(m.includes('failed to fetch')||m.includes('networkerror')||m.includes('network'))return'Sin conexión. Comprueba tu red e inténtalo de nuevo.';
  if(m.includes('invalid email')||m.includes('unable to validate email'))return'Correo electrónico no válido.';
  if(m.includes('signups not allowed')||m.includes('signup is disabled'))return'El registro está deshabilitado en este momento.';
  return e?.message||'No se pudo completar la operación.';
}

// ── Context ───────────────────────────────────────────────────────────────────
const DCtx = createContext(false);
const useD = () => useContext(DCtx);

// ── Date helpers ──────────────────────────────────────────────────────────────
const DAYS_ES=['domingo','lunes','martes','miércoles','jueves','viernes','sábado'];
const MONTHS_ES=['enero','febrero','marzo','abril','mayo','junio','julio','agosto','septiembre','octubre','noviembre','diciembre'];
const TODAY=new Date();
const TODAY_KEY=TODAY.toISOString().split('T')[0];
function fmtToday(d=TODAY){return`${DAYS_ES[d.getDay()]}, ${d.getDate()} ${MONTHS_ES[d.getMonth()]}`;}
function fmtMonth(d=TODAY){return`${MONTHS_ES[d.getMonth()]} ${d.getFullYear()}`;}
function getWeekNum(d=TODAY){const j=new Date(d.getFullYear(),0,1);return Math.ceil(((d-j)/86400000+j.getDay()+1)/7);}
function dateKey(y,m,d){return`${y}-${String(m+1).padStart(2,'0')}-${String(d).padStart(2,'0')}`;}
const EVENT_COLORS=[
  {id:'blue',hex:'#3B82F6'},{id:'purple',hex:'#AF52DE'},
  {id:'green',hex:'#34C759'},{id:'amber',hex:'#FF9F0A'},{id:'red',hex:'#FF3B30'},
];
const DAY_TYPE_CFG={
  festivo:{label:'Festivo',color:'#FF3B30',soft:'rgba(255,59,48,0.12)',Icon:p=><ISparkleStar {...p}/>},
  vacaciones:{label:'Vacaciones',color:'#AF52DE',soft:'rgba(175,82,222,0.12)',Icon:p=><IUmbrella {...p}/>},
  mantenimiento:{label:'Mantenim.',color:'#FF9F0A',soft:'rgba(255,159,10,0.12)',Icon:p=><IWrench {...p}/>},
};
const DEF_CAL_EVENTS={};

// ── localStorage + Supabase sync ──────────────────────────────────────────────
// Real Supabase schema: public.user_data(user_id pk, journal jsonb, habits jsonb,
//   settings jsonb, twelve jsonb, created_at, updated_at). One row per user.
// Local zp_* keys are mapped into those 4 jsonb columns at save/load time.
const SYNC_SKIP=new Set(['zp_tab','zp_hoy_tab','zp_auth','zp_auth_remember','zp_draft_task','zp_draft_lane','zp_last_sync','zp_task_dates']);
function shouldSync(key){return key&&key.startsWith('zp_')&&!SYNC_SKIP.has(key);}

function buildSyncPayload(){
  const settings={},habits={},journal={tasks:{},mental:{},cierre:{},reflexions:{},monthReflexions:{}};
  let twelve={};
  for(let i=0;i<localStorage.length;i++){
    const k=localStorage.key(i);
    if(!shouldSync(k))continue;
    const raw=localStorage.getItem(k);
    if(!raw||raw==='undefined')continue;
    let v;try{v=JSON.parse(raw);}catch{continue;}
    if(v===undefined)continue;
    if(k==='zp_theme')settings.theme=v;
    else if(k==='zp_accent')settings.accent=v;
    else if(k==='zp_streak')settings.streak=v;
    else if(k==='zp_habit_template')settings.habitTemplate=v;
    else if(k==='zp_twelve')twelve=v||{};
    else if(k===TASK_DELETES_KEY)journal.taskDeletes=v||{};
    else if(k===TASK_COMPLETIONS_KEY)journal.taskCompletions=v||{};
    else if(k==='zp_ideas')journal.ideas=v;
    else if(k==='zp_library')journal.library=v;
    else if(k==='zp_agenda_notes')journal.agendaNotes=v;
    else if(k==='zp_notebook')journal.notebook=v;
    else if(k==='zp_cal_events')journal.calEvents=v;
    else if(k==='zp_day_types')journal.dayTypes=v;
    else if(k.startsWith('zp_habits_'))habits[k.slice(10)]=v;
    else if(k.startsWith('zp_tasks_'))journal.tasks[k.slice(9)]=v;
    else if(k.startsWith('zp_mental_'))journal.mental[k.slice(10)]=v;
    else if(k.startsWith('zp_cierre_'))journal.cierre[k.slice(10)]=v;
    else if(k.startsWith('zp_reflexion_'))journal.reflexions[k.slice(13)]=v;
    else if(k.startsWith('zp_month_reflexion_'))journal.monthReflexions[k.slice(19)]=v;
  }
  return{habits,journal,settings,twelve};
}

function readSyncLocal(key,def=null){
  try{
    const raw=localStorage.getItem(key);
    return raw&&raw!=='undefined'?JSON.parse(raw):def;
  }catch{return def;}
}

function mergeArrayById(remoteValue,localValue){
  if(!Array.isArray(remoteValue))return Array.isArray(localValue)?localValue:remoteValue;
  if(!Array.isArray(localValue))return remoteValue;
  const remoteById=new Map(remoteValue.filter(x=>x&&x.id).map(x=>[String(x.id),x]));
  const seen=new Set();
  const out=[];
  for(const item of localValue){
    if(!item||!item.id){out.push(item);continue;}
    const id=String(item.id);
    seen.add(id);
    out.push(remoteById.has(id)?{...remoteById.get(id),...item}:item);
  }
  for(const item of remoteValue){
    if(item&&item.id&&seen.has(String(item.id)))continue;
    out.push(item);
  }
  return out;
}

function mergeTimestampMap(remoteValue,localValue){
  const out={...(remoteValue&&typeof remoteValue==='object'?remoteValue:{})};
  if(!localValue||typeof localValue!=='object')return out;
  Object.entries(localValue).forEach(([id,value])=>{
    const remoteTime=Date.parse(out[id]||'')||0;
    const localTime=Date.parse(value||'')||0;
    if(!out[id]||localTime>=remoteTime)out[id]=value;
  });
  return out;
}

function agendaNoteTime(note){
  const raw=note&&typeof note==='object'?note.updatedAt:null;
  if(typeof raw==='number'&&Number.isFinite(raw))return raw;
  const t=Date.parse(raw||'');
  return Number.isFinite(t)?t:0;
}
function normalizeAgendaNotes(value){
  const out={};
  if(!value||typeof value!=='object')return out;
  Object.entries(value).forEach(([date,note])=>{
    if(note&&typeof note==='object')out[date]={text:String(note.text||''),updatedAt:note.updatedAt||0,deleted:!!note.deleted};
    else out[date]={text:String(note||''),updatedAt:0,deleted:!String(note||'').trim()};
  });
  return out;
}
function mergeAgendaNotes(remoteValue,localValue){
  const out=normalizeAgendaNotes(remoteValue);
  const local=normalizeAgendaNotes(localValue);
  Object.entries(local).forEach(([date,note])=>{
    const current=out[date];
    if(!current||agendaNoteTime(note)>=agendaNoteTime(current))out[date]=note;
  });
  return out;
}
function notebookPageTime(page){
  const raw=page&&typeof page==='object'?page.updatedAt:null;
  if(typeof raw==='number'&&Number.isFinite(raw))return raw;
  const t=Date.parse(raw||'');
  return Number.isFinite(t)?t:0;
}
function normalizeNotebook(value){
  const pages=Array.isArray(value?.pages)?value.pages:[];
  const safePages=pages.filter(p=>p&&p.id).map((p,i)=>({
    id:String(p.id),
    title:String(p.title||`Página ${i+1}`),
    html:String(p.html||''),
    text:String(p.text||''),
    createdAt:p.createdAt||p.updatedAt||new Date().toISOString(),
    updatedAt:p.updatedAt||p.createdAt||new Date().toISOString(),
  }));
  return{pages:safePages,currentId:value?.currentId||safePages[0]?.id||null};
}
function mergeNotebook(remoteValue,localValue){
  const remote=normalizeNotebook(remoteValue);
  const local=normalizeNotebook(localValue);
  const byId=new Map(remote.pages.map(p=>[p.id,p]));
  local.pages.forEach(page=>{
    const current=byId.get(page.id);
    if(!current||notebookPageTime(page)>=notebookPageTime(current))byId.set(page.id,page);
  });
  const pages=Array.from(byId.values()).sort((a,b)=>(a.createdAt||'').localeCompare(b.createdAt||''));
  return{pages,currentId:local.currentId||remote.currentId||pages[0]?.id||null};
}

function taskTime(item){
  const t=Date.parse(item?.updatedAt||item?.createdAt||'');
  return Number.isFinite(t)?t:0;
}
function taskDeleteMap(){
  return readSyncLocal(TASK_DELETES_KEY,{})||{};
}
function taskCompletionMap(){
  return readSyncLocal(TASK_COMPLETIONS_KEY,{})||{};
}
function isTaskDeleted(item){
  if(!item||!item.id)return false;
  const deletedAt=Date.parse(taskDeleteMap()[item.id]||'');
  return Number.isFinite(deletedAt)&&deletedAt>0&&deletedAt>=taskTime(item);
}
function hasTaskCompletionMark(item){
  if(!item||!item.id)return false;
  const completedAt=Date.parse(taskCompletionMap()[item.id]||'');
  return Number.isFinite(completedAt)&&completedAt>0&&completedAt>=taskTime(item);
}
function lastSyncTime(value){
  const t=Date.parse(value||'');
  return Number.isFinite(t)?t:0;
}
function shouldCompleteMissingRemoteTask(item,opts={}){
  if(!item||item.done)return false;
  if(hasTaskCompletionMark(item))return true;
  const remoteTime=taskTime(item);
  const syncedAt=lastSyncTime(opts.localLastSyncAt);
  return remoteTime>0&&syncedAt>0&&remoteTime<=syncedAt;
}
function shouldCompleteMissingLocalTask(item,opts={}){
  if(!item||item.done)return false;
  if(hasTaskCompletionMark(item))return true;
  const localTime=taskTime(item);
  const syncedAt=lastSyncTime(opts.localLastSyncAt);
  const remoteUpdatedAt=lastSyncTime(opts.remoteUpdatedAt);
  return localTime>0&&syncedAt>0&&localTime<=syncedAt&&(!remoteUpdatedAt||remoteUpdatedAt>=syncedAt);
}
function taskLaneRank(lane){
  return lane==='top3'?3:lane==='parking'?2:lane==='enfoque'?1:0;
}
function maxIso(...values){
  let best='';
  let bestTime=0;
  values.forEach(v=>{
    const t=Date.parse(v||'');
    if(Number.isFinite(t)&&t>bestTime){bestTime=t;best=v;}
  });
  return best;
}
function mergeTaskItem(remoteItem,localItem,lane){
  if(!remoteItem)return localItem?{...localItem,lane}:null;
  if(!localItem)return{...remoteItem,lane};
  const remoteTime=taskTime(remoteItem);
  const localTime=taskTime(localItem);
  const base=localTime>=remoteTime?localItem:remoteItem;
  const other=base===localItem?remoteItem:localItem;
  const done=!!remoteItem.done||!!localItem.done;
  const merged={...other,...base,lane,done};
  const updatedAt=maxIso(remoteItem.updatedAt,localItem.updatedAt);
  const completedAt=maxIso(remoteItem.completedAt,localItem.completedAt);
  if(updatedAt)merged.updatedAt=updatedAt;
  if(done)merged.completedAt=completedAt||updatedAt||new Date().toISOString();
  return merged;
}
function mergeTaskBuckets(remoteValue,localValue,opts={}){
  const lanes=['top3','enfoque','parking'];
  const empty={top3:[],enfoque:[],parking:[]};
  const remote=normalizeTaskBuckets(remoteValue||empty).tasks;
  const local=normalizeTaskBuckets(localValue||empty).tasks;
  const merged={top3:[],enfoque:[],parking:[]};
  const byId=new Map();
  const loose=[];
  const take=(item,lane,source)=>{
    if(!item||isTaskDeleted(item))return;
    if(!item.id){loose.push({item,lane});return;}
    const id=String(item.id);
    const rec=byId.get(id)||{};
    if(source==='local')byId.set(id,{...rec,local:item,localLane:lane});
    else byId.set(id,{...rec,remote:item,remoteLane:lane});
  };
  lanes.forEach(lane=>(remote[lane]||[]).forEach(item=>take(item,lane,'remote')));
  lanes.forEach(lane=>(local[lane]||[]).forEach(item=>take(item,lane,'local')));
  loose.forEach(({item,lane})=>merged[lane].push(item));
  byId.forEach(rec=>{
    const lane=rec.localLane||rec.remoteLane||'enfoque';
    let item=mergeTaskItem(rec.remote,rec.local,lane);
    if(opts.completeRemoteMissingFromLocal&&rec.remote&&!rec.local&&shouldCompleteMissingRemoteTask(rec.remote,opts)){
      item=touchTask({...rec.remote,done:true},rec.remoteLane||lane);
    }else if(opts.completeLocalMissingFromRemote&&rec.local&&!rec.remote&&shouldCompleteMissingLocalTask(rec.local,opts)){
      item=touchTask({...rec.local,done:true},rec.localLane||lane);
    }
    if(item)merged[lane].push(item);
  });
  return normalizeTaskBuckets(merged).tasks;
}

function tasksHaveAny(value){
  const t=normalizeTaskBuckets(value||{top3:[],enfoque:[],parking:[]}).tasks;
  return ['top3','enfoque','parking'].some(l=>(t[l]||[]).some(item=>item&&!isTaskDeleted(item)));
}
function taskBucketsEqual(a,b){
  return JSON.stringify(normalizeTaskBuckets(a||{top3:[],enfoque:[],parking:[]}).tasks)===
    JSON.stringify(normalizeTaskBuckets(b||{top3:[],enfoque:[],parking:[]}).tasks);
}
function localTaskKeys(){
  const keys=[];
  for(let i=0;i<localStorage.length;i++){
    const k=localStorage.key(i);
    if(k&&k.startsWith('zp_tasks_'))keys.push(k);
  }
  return keys;
}
function preserveLocalTasksAfterPull(remoteTasks){
  const dates=new Set([...Object.keys(remoteTasks||{}),...localTaskKeys().map(k=>k.slice(9))]);
  let needsPush=false;
  dates.forEach(d=>{
    const key='zp_tasks_'+d;
    const localValue=readSyncLocal(key,null);
    if(localValue===null)return;
    const remoteValue=(remoteTasks||{})[d]||{top3:[],enfoque:[],parking:[]};
    if(!taskBucketsEqual(localValue,remoteValue)){__dirtyKeys.add(key);needsPush=true;}
  });
  if(needsPush&&!__pushTimer&&!__pushInFlight)__pushTimer=setTimeout(flushPush,100);
}

// Apply remote row to localStorage. Dirty list-like keys are merged by id so a
// stale device cannot erase tasks/habits that were added elsewhere while closed.
function applySyncRow(row,dirty){
  if(!row)return false;
  const s=row.settings||{},h=row.habits||{},j=row.journal||{},tw=row.twelve;
  const localLastSyncAt=localStorage.getItem('zp_last_sync')||'';
  const remoteUpdatedAt=row.updated_at||'';
  let changed=false;
  const put=(k,v)=>{
    let nextValue=v;
    if(k.startsWith('zp_tasks_')){
      const localValue=readSyncLocal(k,null);
      if(localValue)nextValue=mergeTaskBuckets(v,localValue,{
        completeRemoteMissingFromLocal:k===`zp_tasks_${TODAY_KEY}`,
        completeLocalMissingFromRemote:true,
        localLastSyncAt,
        remoteUpdatedAt,
      });
    }else if(k===TASK_DELETES_KEY||k===TASK_COMPLETIONS_KEY){
      const localValue=readSyncLocal(k,{});
      nextValue=mergeTimestampMap(v,localValue);
    }else if(k==='zp_agenda_notes'){
      const localValue=readSyncLocal(k,{});
      nextValue=mergeAgendaNotes(v,localValue);
    }else if(k==='zp_notebook'){
      const localValue=readSyncLocal(k,{});
      nextValue=mergeNotebook(v,localValue);
    }else if(dirty&&dirty.has(k)){
      const localValue=readSyncLocal(k);
      if(k.startsWith('zp_habits_')||k.startsWith('zp_mental_')||k.startsWith('zp_cierre_'))nextValue=mergeArrayById(v,localValue);
      else return;
    }
    const next=JSON.stringify(nextValue);
    if(localStorage.getItem(k)===next)return;
    try{localStorage.setItem(k,next);changed=true;window.dispatchEvent(new CustomEvent('zp-ls',{detail:{key:k}}));}catch{}
  };
  if(s.theme!==undefined)put('zp_theme',s.theme);
  if(s.accent!==undefined)put('zp_accent',s.accent);
  if(s.streak!==undefined)put('zp_streak',s.streak);
  if(s.habitTemplate!==undefined)put('zp_habit_template',s.habitTemplate);
  if(tw&&Object.keys(tw).length>0)put('zp_twelve',tw);
  for(const[d,v]of Object.entries(h))put('zp_habits_'+d,v);
  if(j.ideas!==undefined)put('zp_ideas',j.ideas);
  if(j.library!==undefined)put('zp_library',j.library);
  if(j.agendaNotes!==undefined)put('zp_agenda_notes',j.agendaNotes);
  if(j.notebook!==undefined)put('zp_notebook',j.notebook);
  if(j.calEvents!==undefined)put('zp_cal_events',j.calEvents);
  if(j.dayTypes!==undefined)put('zp_day_types',j.dayTypes);
  if(j.taskDeletes!==undefined)put(TASK_DELETES_KEY,j.taskDeletes);
  if(j.taskCompletions!==undefined)put(TASK_COMPLETIONS_KEY,j.taskCompletions);
  if(j.tasks)for(const[d,v]of Object.entries(j.tasks))put('zp_tasks_'+d,v);
  if(j.mental)for(const[d,v]of Object.entries(j.mental))put('zp_mental_'+d,v);
  if(j.cierre)for(const[d,v]of Object.entries(j.cierre))put('zp_cierre_'+d,v);
  if(j.reflexions)for(const[d,v]of Object.entries(j.reflexions))put('zp_reflexion_'+d,v);
  if(j.monthReflexions)for(const[d,v]of Object.entries(j.monthReflexions))put('zp_month_reflexion_'+d,v);
  return changed;
}

// Keys modified locally and not yet successfully pushed.
const __dirtyKeys=new Set();
let __pushTimer=null;
let __pushInFlight=false;
let __lastRemoteUpdatedAt=null;

async function flushPush(){
  __pushTimer=null;
  if(__pushInFlight){__pushTimer=setTimeout(flushPush,200);return;}
  if(__dirtyKeys.size===0)return;
  __pushInFlight=true;
  const dirtySnapshot=new Set(__dirtyKeys);
  try{
    const{data:{session}}=await sb.auth.getSession();
    if(!session){__pushInFlight=false;return;}
    // Pull-merge-push: fetch the latest remote first, merge any keys that are
    // NOT dirty into local. This way our push won't overwrite changes made on
    // another device for keys we haven't touched.
    const{data:remote,error:pullErr}=await sb.from('user_data').select('*').eq('user_id',session.user.id).maybeSingle();
    if(pullErr){console.error('[zp sync push→pull]',pullErr);__pushInFlight=false;return;}
    let mergedChanged=false;
    if(remote){
      mergedChanged=applySyncRow(remote,dirtySnapshot);
      __lastRemoteUpdatedAt=remote.updated_at||__lastRemoteUpdatedAt;
    }
    // Clear dirty up-front; if push fails we'll restore them.
    dirtySnapshot.forEach(k=>__dirtyKeys.delete(k));
    const payload={user_id:session.user.id,...buildSyncPayload(),updated_at:new Date().toISOString()};
    const{data:upserted,error}=await sb.from('user_data').upsert(payload,{onConflict:'user_id'}).select().maybeSingle();
    if(error){
      console.error('[zp sync push]',error.message,error);
      dirtySnapshot.forEach(k=>__dirtyKeys.add(k));
    }else{
      if(upserted&&upserted.updated_at){__lastRemoteUpdatedAt=upserted.updated_at;try{localStorage.setItem('zp_last_sync',upserted.updated_at);}catch{}}
      if(window.__zpDebug)console.log('[zp sync push] ok, keys:',[...dirtySnapshot]);
      // Only signal a top-level resync if the pre-push pull actually merged
      // remote changes into our localStorage. Otherwise we'd remount the app
      // on every keystroke and tear down whatever the user is doing.
      if(mergedChanged)window.dispatchEvent(new CustomEvent('zp-resync'));
    }
  }catch(err){
    console.error('[zp sync push] threw:',err);
    dirtySnapshot.forEach(k=>__dirtyKeys.add(k));
  }finally{__pushInFlight=false;}
}

function pushRemote(key){
  if(!shouldSync(key))return;
  __dirtyKeys.add(key);
  if(__pushTimer)clearTimeout(__pushTimer);
  __pushTimer=setTimeout(flushPush,400);
}

async function pullAllRemote(userId){
  try{
    const{data,error}=await sb.from('user_data').select('*').eq('user_id',userId).maybeSingle();
    if(error){console.error('[zp sync pull] error:',error.message,error);return{ok:false,changed:false};}
    if(!data){
      // No row yet for this user → seed from current local state.
      const payload={user_id:userId,...buildSyncPayload(),updated_at:new Date().toISOString()};
      const{data:seeded,error:seedErr}=await sb.from('user_data').upsert(payload,{onConflict:'user_id'}).select().maybeSingle();
      if(seedErr)console.error('[zp sync seed]',seedErr.message,seedErr);
      else{__lastRemoteUpdatedAt=seeded&&seeded.updated_at;console.log('[zp sync seed] created row for new user');}
      return{ok:true,changed:false};
    }
    preserveLocalTasksAfterPull(data.journal?.tasks||{});
    // Skip if we already have this exact remote version (cheap dedupe).
    if(__lastRemoteUpdatedAt&&data.updated_at===__lastRemoteUpdatedAt&&__dirtyKeys.size===0){
      if(window.__zpDebug)console.log('[zp sync pull] up-to-date, skip');
      return{ok:true,changed:false};
    }
    const changed=applySyncRow(data,__dirtyKeys);
    __lastRemoteUpdatedAt=data.updated_at||__lastRemoteUpdatedAt;
    try{if(data.updated_at)localStorage.setItem('zp_last_sync',data.updated_at);}catch{}
    console.log('[zp sync pull] hydrated, updated_at=',data.updated_at,'changed=',changed);
    return{ok:true,changed};
  }catch(err){console.error('[zp sync pull] threw:',err);return{ok:false,changed:false};}
}

// ── Realtime + polling fallback ──
let __rtChannel=null;
let __pollTimer=null;
function startRealtime(userId){
  stopRealtime();
  try{
    __rtChannel=sb.channel(`zp_user_data_${userId}`)
      .on('postgres_changes',
        {event:'*',schema:'public',table:'user_data',filter:`user_id=eq.${userId}`},
        payload=>{
          const newAt=payload&&payload.new&&payload.new.updated_at;
          if(newAt&&newAt===__lastRemoteUpdatedAt)return;
          if(window.__zpDebug)console.log('[zp realtime] change',newAt);
          pullAndNotify(true);
        })
      .subscribe(status=>{if(window.__zpDebug)console.log('[zp realtime] status:',status);});
  }catch(err){console.error('[zp realtime] subscribe failed:',err);}
  // Polling fallback every 15s while visible (covers cases where realtime
  // isn't enabled on the table).
  if(__pollTimer)clearInterval(__pollTimer);
  __pollTimer=setInterval(()=>{
    if(document.visibilityState==='visible')pullAndNotify(false);
  },15000);
}
function stopRealtime(){
  if(__rtChannel){try{sb.removeChannel(__rtChannel);}catch{}__rtChannel=null;}
  if(__pollTimer){clearInterval(__pollTimer);__pollTimer=null;}
  __dirtyKeys.clear();
  __lastRemoteUpdatedAt=null;
  if(__pushTimer){clearTimeout(__pushTimer);__pushTimer=null;}
}
function useLS(key,def){
  const[val,setVal]=useState(()=>{try{const s=localStorage.getItem(key);return s&&s!=='undefined'?JSON.parse(s):def;}catch{return def;}});
  const set=useCallback(v=>{
    setVal(curr=>{
      const next=typeof v==='function'?v(curr):v;
      try{
        if(next===undefined)localStorage.removeItem(key);
        else localStorage.setItem(key,JSON.stringify(next));
      }catch{}
      pushRemote(key);
      return next;
    });
  },[key]);
  // Re-read when sync layer applies a remote change to this key.
  useEffect(()=>{
    const fn=e=>{
      if(!e||!e.detail||e.detail.key!==key)return;
      try{const s=localStorage.getItem(key);setVal(s?JSON.parse(s):def);}catch{}
    };
    const storageFn=e=>{
      if(!e||e.key!==key)return;
      if(key===`zp_tasks_${TODAY_KEY}`)recordCompletionsFromTaskDiff(e.oldValue,e.newValue);
      try{setVal(e.newValue&&e.newValue!=='undefined'?JSON.parse(e.newValue):def);}catch{}
      if(shouldSync(key))pushRemote(key);
    };
    window.addEventListener('zp-ls',fn);
    window.addEventListener('storage',storageFn);
    return()=>{
      window.removeEventListener('zp-ls',fn);
      window.removeEventListener('storage',storageFn);
    };
  },[key]);
  return[val,set];
}

const REPEAT_UNITS=[
  {id:'none',label:'No repetir'},
  {id:'hour',label:'Horas'},

const REMINDER_FIRED_KEY='zp_notif_fired';
function parseDateKeyLocal(key){
  const [y,m,d]=(key||'').split('-').map(Number);
  return new Date(y||0,(m||1)-1,d||1,0,0,0,0);
}
function timeToParts(time){
  const [hh,mm]=(time||'00:00').split(':').map(v=>parseInt(v,10)||0);
  return{hh,mm};
}
function combineDateKeyAndTime(key,time){
  const dt=parseDateKeyLocal(key);
  const{hh,mm}=timeToParts(time);
  dt.setHours(hh,mm,0,0);
  return dt;
}
function monthDiff(from,to){
  return(to.getFullYear()-from.getFullYear())*12+(to.getMonth()-from.getMonth());
}
function eventRepeatUnit(ev){return ev?.repeatUnit||'none';}
function eventRepeatEvery(ev){return Math.max(1,parseInt(ev?.repeatEvery,10)||1);}
function eventHasReminder(ev){return !!ev?.remind;}
function repeatSummary(ev){
  const unit=eventRepeatUnit(ev);
  const every=eventRepeatEvery(ev);
  if(unit==='none')return'Una vez';
  if(unit==='hour')return every===1?'Cada hora':`Cada ${every} horas`;
  if(unit==='day')return every===1?'Cada día':`Cada ${every} días`;
  if(unit==='week')return every===1?'Cada semana':`Cada ${every} semanas`;
  if(unit==='month')return every===1?'Cada mes':`Cada ${every} meses`;
  if(unit==='year')return every===1?'Cada año':`Cada ${every} años`;
  return'Una vez';
}
function eventOccursOnDate(baseKey,ev,targetKey){
  if(!baseKey||!targetKey)return false;
  const unit=eventRepeatUnit(ev);
  const every=eventRepeatEvery(ev);
  const base=parseDateKeyLocal(baseKey);
  const target=parseDateKeyLocal(targetKey);
  const diffDays=Math.floor((target-base)/86400000);
  if(unit==='none')return baseKey===targetKey;
  if(diffDays<0)return false;
  if(unit==='hour')return true;
  if(unit==='day')return diffDays%every===0;
  if(unit==='week')return diffDays%(every*7)===0;
  if(unit==='month'){
    const diffMonths=monthDiff(base,target);
    return diffMonths>=0&&diffMonths%every===0&&base.getDate()===target.getDate();
  }
  if(unit==='year'){
    const diffYears=target.getFullYear()-base.getFullYear();
    return diffYears>=0&&diffYears%every===0&&base.getMonth()===target.getMonth()&&base.getDate()===target.getDate();
  }
  return false;
}
function getEventsForDate(calEvents,targetKey){
  const out=[];
  for(const[baseKey,items]of Object.entries(calEvents||{})){
    if(!Array.isArray(items))continue;
    items.forEach(ev=>{
      if(eventOccursOnDate(baseKey,ev,targetKey))out.push({...ev,__baseKey:baseKey});
    });
  }
  return out.sort((a,b)=>(a.time||'00:00').localeCompare(b.time||'00:00')||(a.title||'').localeCompare(b.title||''));
}
function loadReminderHistory(){
  try{
    const raw=localStorage.getItem(REMINDER_FIRED_KEY);
    return raw?JSON.parse(raw):{};
  }catch{return{};}
}
function saveReminderHistory(hist){
  try{localStorage.setItem(REMINDER_FIRED_KEY,JSON.stringify(hist));}catch{}
}
function reminderOccurrenceKey(baseKey,ev,occAt){
  return`${ev.id}|${baseKey}|${occAt.toISOString()}`;
}
function isDueReminder(now,occAt){
  const diff=now.getTime()-occAt.getTime();
  return diff>=0&&diff<90000;
}
function dueReminderOccurrences(calEvents,now=new Date()){
  const due=[];
  const todayKey=dateKey(now.getFullYear(),now.getMonth(),now.getDate());
  for(const[baseKey,items]of Object.entries(calEvents||{})){
    if(!Array.isArray(items))continue;
    items.forEach(ev=>{
      if(!eventHasReminder(ev))return;
      const unit=eventRepeatUnit(ev);
      const every=eventRepeatEvery(ev);
      const baseAt=combineDateKeyAndTime(baseKey,ev.time||'00:00');
      if(now<baseAt)return;
      if(unit==='hour'){
        const stepMs=every*3600000;
        const diff=now.getTime()-baseAt.getTime();
        const count=Math.floor(diff/stepMs);
        const occAt=new Date(baseAt.getTime()+count*stepMs);
        if(isDueReminder(now,occAt))due.push({ev,baseKey,occAt});
        return;
      }
      if(!eventOccursOnDate(baseKey,ev,todayKey))return;
      const occAt=combineDateKeyAndTime(todayKey,ev.time||'00:00');
      if(isDueReminder(now,occAt))due.push({ev,baseKey,occAt});
    });
  }
  return due;
}
function fireCalendarReminders(calEvents){
  if(typeof window==='undefined'||typeof Notification==='undefined'||Notification.permission!=='granted')return;
  const history=loadReminderHistory();
  const now=new Date();
  let changed=false;
  dueReminderOccurrences(calEvents,now).forEach(({ev,baseKey,occAt})=>{
    const key=reminderOccurrenceKey(baseKey,ev,occAt);
    if(history[key])return;
    history[key]=Date.now();
    changed=true;
    try{
      new Notification(ev.title||'Recordatorio', {
        body:`${occAt.toLocaleTimeString('es-ES',{hour:'2-digit',minute:'2-digit'})} · ${repeatSummary(ev)}`,
        tag:key,
      });
    }catch{}
  });
  const cutoff=Date.now()-1000*60*60*24*45;
  Object.keys(history).forEach(k=>{if(history[k]<cutoff){delete history[k];changed=true;}});
  if(changed)saveReminderHistory(history);
}
function normalizeTaskBuckets(tasks){

      const target=lane==='enfoque'&&explicitLane&&explicitLane!=='enfoque'?explicitLane:lane;
      const nextItem=item&&item.lane===target?item:{...item,lane:target};
      if(target!==lane||nextItem!==item)changed=true;
      if(!nextItem?.id){loose.push({item:nextItem,lane:target});return;}
      const id=String(nextItem.id);
      const prev=byId.get(id);
      const nextTime=taskTime(nextItem);
      const prevTime=prev?taskTime(prev.item):0;
      const wins=!prev||
        taskLaneRank(target)>taskLaneRank(prev.lane)||
        (taskLaneRank(target)===taskLaneRank(prev.lane)&&nextTime>=prevTime);
      if(wins)byId.set(id,{item:nextItem,lane:target});
      if(prev)changed=true;
    });
  });
  const safe={top3:[],enfoque:[],parking:[]};
  loose.forEach(({item,lane})=>safe[lane].push(item));
  byId.forEach(({item,lane})=>safe[lane].push(item));
  if(safe.top3.length<=3)return{tasks:safe,changed};
  const keep=safe.top3.slice(0,3);
  const overflow=safe.top3.slice(3);
  return{
    tasks:{top3:keep,enfoque:[...overflow,...safe.enfoque],parking:safe.parking},
    changed:true,
  };
}
function readLSJSON(key,def=null){
  try{
    const s=localStorage.getItem(key);
    return s&&s!=='undefined'?JSON.parse(s):def;
  }catch{return def;}
}
function notifyLSKey(key){
  try{window.dispatchEvent(new CustomEvent('zp-ls',{detail:{key}}));}catch{}
}
function taskStorageKey(dateKeyValue){
  return`zp_tasks_${dateKeyValue}`;
}
function readTasksForDate(dateKeyValue){
  return normalizeTaskBuckets(readLSJSON(taskStorageKey(dateKeyValue),DEF_TASKS)||DEF_TASKS).tasks;
}
function taskNow(){return new Date().toISOString();}
function touchTask(task,lane){
  const now=taskNow();
  const next={...task,...(lane?{lane}:{}),updatedAt:now};
  if(next.done)next.completedAt=next.completedAt||now;
  return next;
}
function makeTask(id,text,createdDate,lane){
  return{id,text,done:false,subtasks:[],createdDate,...(lane?{lane}:{}),updatedAt:taskNow()};
}
function recordTaskDelete(id){
  if(!id)return;
  const deletes=readLSJSON(TASK_DELETES_KEY,{})||{};
  deletes[id]=taskNow();
  try{localStorage.setItem(TASK_DELETES_KEY,JSON.stringify(deletes));}catch{}
  pushRemote(TASK_DELETES_KEY);
}
function recordTaskCompletion(id,at=taskNow()){
  if(!id)return;
  const completions=readLSJSON(TASK_COMPLETIONS_KEY,{})||{};
  completions[id]=at;
  try{localStorage.setItem(TASK_COMPLETIONS_KEY,JSON.stringify(completions));}catch{}
  pushRemote(TASK_COMPLETIONS_KEY);
}
function taskIdsFromBuckets(tasks){
  const out=new Set();
  const normalized=normalizeTaskBuckets(tasks||DEF_TASKS).tasks;
  ['top3','enfoque','parking'].forEach(l=>(normalized[l]||[]).forEach(t=>{if(t&&t.id)out.add(String(t.id));}));
  return out;
}
function recordCompletionsFromTaskDiff(oldRaw,newRaw){
  if(!oldRaw||oldRaw==='undefined')return;
  let oldValue,newValue;
  try{oldValue=JSON.parse(oldRaw);newValue=newRaw&&newRaw!=='undefined'?JSON.parse(newRaw):DEF_TASKS;}catch{return;}
  const oldIds=taskIdsFromBuckets(oldValue);
  const newIds=taskIdsFromBuckets(newValue);
  oldIds.forEach(id=>{if(!newIds.has(id))recordTaskCompletion(id);});
}
function writeTasksForDate(dateKeyValue,updater){
  const key=taskStorageKey(dateKeyValue);
  const current=readTasksForDate(dateKeyValue);
  const nextRaw=typeof updater==='function'?updater(current):updater;
  const normalized=normalizeTaskBuckets(nextRaw).tasks;
  try{localStorage.setItem(key,JSON.stringify(normalized));}catch{}
  pushRemote(key);
  notifyLSKey(key);
  return normalized;
}

// ── Rollover: pull undone tasks from previous days into today ─────────────────
// Called at module load (sync, so useLS sees correct state) AND after the
// initial pullAllRemote resolves (to fix any overwrite from the remote pull).
function ensureRollover(){
  try{
    const lanes=['top3','enfoque','parking'];
    const rls=k=>{try{const s=localStorage.getItem(k);return s&&s!=='undefined'?JSON.parse(s):null;}catch{return null;}};
    let past=null,pastKey=null;
    for(let i=1;i<=30;i++){
      const d=new Date(TODAY);d.setDate(d.getDate()-i);
      const dk=d.toISOString().split('T')[0];
      const t=rls('zp_tasks_'+dk);
      if(t&&lanes.some(l=>Array.isArray(t[l])&&t[l].length>0)){past=t;pastKey=dk;break;}
    }
    if(!past)return;
    const pastIds=new Set(lanes.flatMap(l=>(past[l]||[]).map(t=>t.id)));
    const todayKey='zp_tasks_'+TODAY_KEY;
    const todayRaw=localStorage.getItem(todayKey);
    const todayAlreadyExists=!!(todayRaw&&todayRaw!=='undefined');
    const existing=rls(todayKey)||{top3:[],enfoque:[],parking:[]};
    const existingIds=new Set(lanes.flatMap(l=>(existing[l]||[]).map(t=>t.id)));
    const updated={top3:[...(existing.top3||[])],enfoque:[...(existing.enfoque||[])],parking:[...(existing.parking||[])]};
    let chg=false;
    for(const l of lanes){
      // Add unfinished past tasks only before today's task bucket exists.
      // Once today exists, a missing id means the user/widget already dealt with it.
      const od=(past[l]||[]).filter(t=>!todayAlreadyExists&&!t.done&&!existingIds.has(t.id)&&!isTaskDeleted(t)&&!hasTaskCompletionMark(t))
        .map(t=>t.createdDate?t:{...t,createdDate:pastKey});
      if(od.length){updated[l]=[...od,...updated[l]];chg=true;}
      // Backfill createdDate on existing today's tasks that came from a past day
      updated[l]=updated[l].map(t=>{
        if(t.createdDate||!pastIds.has(t.id))return t;
        chg=true;return{...t,createdDate:pastKey};
      });
    }
    // Always refresh the task-dates registry from the current (possibly updated) data
    const dates={};
    try{const s=localStorage.getItem('zp_task_dates');if(s&&s!=='undefined')Object.assign(dates,JSON.parse(s));}catch{}
    for(const l of lanes)(updated[l]||[]).forEach(t=>{
      if(t.createdDate&&t.createdDate<TODAY_KEY)dates[t.id]=t.createdDate;
    });
    localStorage.setItem('zp_task_dates',JSON.stringify(dates));

    const normalized=normalizeTaskBuckets(updated);
    if(normalized.changed){chg=true;}
    if(chg){
      localStorage.setItem(todayKey,JSON.stringify(normalized.tasks));
      pushRemote(todayKey);
      window.dispatchEvent(new CustomEvent('zp-resync'));
    }
  }catch(e){console.error('[zp rollover]',e);}
}
ensureRollover(); // Run immediately at module load (before React/Supabase)

function Chip({children,tint,style}){

}
function ScorePill({score,size='md'}){
  const hue=scoreHue(score),soft=scoreHueSoft(score),big=size==='lg';
  return<div style={{display:'inline-flex',alignItems:'baseline',gap:3,padding:big?'8px 16px':'4px 11px',
    borderRadius:999,background:soft,border:`0.5px solid ${hue}33`,color:hue,

    {score!=null?score.toFixed(1):'—'}
    {big&&<span style={{fontSize:13,fontWeight:500,opacity:0.55}}>/10</span>}
  </div>;
}
function LinearProgress({value,max=1,color,thickness=4}){
  const pct=Math.max(0,Math.min(1,max>0?value/max:0))*100;
  return<div style={{background:'var(--fill-1)',borderRadius:999,height:thickness,overflow:'hidden'}}>
    <div style={{height:'100%',width:`${pct}%`,background:color||'var(--accent)',
      borderRadius:999,transition:'width 0.5s cubic-bezier(.2,.8,.2,1)'}}/>
  </div>;
}
function Ring({value,max=1,size=64,stroke=7,color='var(--accent)',children}){
  const pct=Math.max(0,Math.min(1,max>0?value/max:0));
  const r=(size-stroke)/2,c=2*Math.PI*r;
  return<div style={{position:'relative',width:size,height:size}}>
    <svg width={size} height={size} style={{transform:'rotate(-90deg)'}}>
      <circle cx={size/2} cy={size/2} r={r} stroke="var(--fill-1)" strokeWidth={stroke} fill="none" opacity="0.8"/>
      <circle cx={size/2} cy={size/2} r={r} stroke={color} strokeWidth={stroke} fill="none"
        strokeLinecap="round" strokeDasharray={c} strokeDashoffset={c*(1-pct)}
        style={{transition:'stroke-dashoffset 0.6s cubic-bezier(.2,.8,.2,1)'}}/>
    </svg>
    {children&&<div style={{position:'absolute',inset:0,display:'flex',alignItems:'center',justifyContent:'center'}}>{children}</div>}
  </div>;
}

    <div>
      <div style={{fontSize:13,fontWeight:600,color:'var(--text-1)',marginBottom:2}}>Vas en racha</div>
      <div style={{fontSize:12,color:'var(--text-2)',lineHeight:1.4}}>{streak} días consecutivos con score ≥ 6.</div>
    </div>
  </div>;

  if(isD){
    return<div style={{padding:`0 ${px}px 24px`,display:'grid',gridTemplateColumns:'1.1fr 1fr 1fr',gap:20,alignItems:'start'}}>
      <div style={{display:'flex',flexDirection:'column',gap:18}}>
        {ScoreCard}
        {InsightBanner}
      </div>
      <div style={{display:'flex',flexDirection:'column',gap:18}}>
        {Top3Card}
        {RingsCard}
      </div>
      <div style={{display:'flex',flexDirection:'column',gap:18}}>
        {HabitsCard}
      </div>
    </div>;
  }
  return<div style={{padding:'0 14px',display:'flex',flexDirection:'column',gap:10}}>
    {ScoreCard}{RingsCard}{Top3Card}{HabitsCard}{InsightBanner}
  </div>;
}

function HoyTareas({tasks,setTasks}){
  const isD=useD();
  const[newTask,setNewTask]=useLS('zp_draft_task','');
  const[newLane,setNewLane]=useLS('zp_draft_lane','enfoque');
  const newLaneRef=useRef(newLane);
  useEffect(()=>{newLaneRef.current=newLane;},[newLane]);
  const taskDates=React.useMemo(()=>{try{const s=localStorage.getItem('zp_task_dates');return s?JSON.parse(s):{};}catch{return{};}},[]); // registry safe from Supabase overwrite
  const[editTask,setEditTask]=useState({lane:null,id:null,val:''});
  const[expanded,setExpanded]=useState({});
  const[newSub,setNewSub]=useState({});
  const LANES=[
    {id:'top3',label:'Top 3',desc:'máx. 3',color:'var(--accent)'},
    {id:'enfoque',label:'En Foco',desc:'',color:'var(--sys-purple)'},
    {id:'parking',label:'Parking',desc:'',color:'var(--text-3)'},
  ];
  const activeTasks=React.useMemo(()=>LANES.reduce((acc,l)=>{
    acc[l.id]=(tasks[l.id]||[]).filter(t=>!t.done);
    return acc;
  },{}),[tasks]);
  const completedTasks=React.useMemo(()=>LANES.flatMap(l=>(tasks[l.id]||[])
    .filter(t=>t.done)
    .map(t=>({...t,__lane:l.id,__laneLabel:l.label,__laneColor:l.color}))),[tasks]);
  function toggleTask(lane,id){setTasks(prev=>({...prev,[lane]:(prev[lane]||[]).map(t=>{
    if(t.id!==id)return t;
    const next=touchTask({...t,done:!t.done},lane);
    if(next.done)recordTaskCompletion(id,next.completedAt||next.updatedAt);
    return next;
  })}));}
  function chooseNewLane(lane){newLaneRef.current=lane;setNewLane(lane);}
  function addTask(){if(!newTask.trim())return;
    const lane=newLaneRef.current||newLane||'enfoque';
    if(lane==='top3'&&(activeTasks.top3||[]).length>=3){alert('Top 3 solo admite 3 tareas pendientes.');return;}
    const id='t'+Date.now();
    setTasks(prev=>({...prev,[lane]:[...(prev[lane]||[]),makeTask(id,newTask.trim(),TODAY_KEY,lane)]}));setNewTask('');}
  function moveTask(fromLane,toLane,id){
    if(fromLane===toLane)return;
    const currentTask=(tasks[fromLane]||[]).find(t=>t.id===id);
    if(!currentTask)return;
    if(toLane==='top3'&&!currentTask.done&&(activeTasks.top3||[]).length>=3){alert('Top 3 solo admite 3 tareas pendientes.');return;}
    setTasks(prev=>{
      const task=(prev[fromLane]||[]).find(t=>t.id===id);
      if(!task)return prev;
      return{
        ...prev,
        [fromLane]:(prev[fromLane]||[]).filter(t=>t.id!==id),
        [toLane]:[touchTask(task,toLane),...(prev[toLane]||[])],
      };
    });
    if(editTask.id===id)setEditTask(ev=>({...ev,lane:toLane}));
  }
  function deleteTask(lane,id){recordTaskDelete(id);setTasks(prev=>({...prev,[lane]:prev[lane].filter(t=>t.id!==id)}));}
  function startEdit(lane,id,text){setEditTask({lane,id,val:text});}
  function commitEdit(){
    if(!editTask.id)return;
    if(editTask.val.trim())
      setTasks(prev=>({...prev,[editTask.lane]:prev[editTask.lane].map(t=>t.id===editTask.id?touchTask({...t,text:editTask.val.trim()},editTask.lane):t)}));
    else
      {recordTaskDelete(editTask.id);setTasks(prev=>({...prev,[editTask.lane]:prev[editTask.lane].filter(t=>t.id!==editTask.id)}));}
    setEditTask({lane:null,id:null,val:''});
  }
  function toggleSub(lane,tid,sid){setTasks(prev=>({...prev,[lane]:prev[lane].map(t=>t.id===tid?touchTask({...t,subtasks:(t.subtasks||[]).map(s=>s.id===sid?{...s,done:!s.done}:s)},lane):t)}));}
  function addSub(lane,tid){const text=(newSub[tid]||'').trim();if(!text)return;
    const id='s'+Date.now();
    setTasks(prev=>({...prev,[lane]:prev[lane].map(t=>t.id===tid?touchTask({...t,subtasks:[...(t.subtasks||[]),{id,text,done:false}]},lane):t)}));
    setNewSub(prev=>({...prev,[tid]:''}));}
  function deleteSub(lane,tid,sid){setTasks(prev=>({...prev,[lane]:prev[lane].map(t=>t.id===tid?touchTask({...t,subtasks:(t.subtasks||[]).filter(s=>s.id!==sid)},lane):t)}));}
  function toggleExpand(id){setExpanded(prev=>({...prev,[id]:!prev[id]}));}
  const px=isD?52:14;

  function renderTask(t,laneId,laneColor){
    const isEditing=editTask.id===t.id&&editTask.lane===laneId;
    const isExp=!!expanded[t.id];
    const subs=t.subtasks||[];
    const subsDone=subs.filter(s=>s.done).length;
    return<div key={t.id} style={{borderBottom:'0.5px solid var(--separator)'}}>
      <div style={{display:'flex',alignItems:'center',gap:10,padding:'10px 10px',borderRadius:isExp?0:10}}>
        <div onClick={()=>toggleTask(laneId,t.id)} style={{width:20,height:20,borderRadius:10,flexShrink:0,cursor:'pointer',
          border:t.done?'none':`1.5px solid ${laneColor}55`,background:t.done?laneColor:'transparent',
          display:'flex',alignItems:'center',justifyContent:'center',color:'#fff'}}>
          {t.done&&<ICheck size={12}/>}
        </div>
        {isEditing
          ?<input autoFocus value={editTask.val} onChange={e=>setEditTask(ev=>({...ev,val:e.target.value}))}
            onBlur={commitEdit} onKeyDown={e=>{if(e.key==='Enter')commitEdit();if(e.key==='Escape')setEditTask({lane:null,id:null,val:''});}}
            style={{flex:1,fontSize:14,color:'var(--text-1)',background:'var(--fill-1)',border:'none',
              outline:'none',borderRadius:7,padding:'3px 8px',fontFamily:'inherit'}}/>
          :<div onDoubleClick={()=>startEdit(laneId,t.id,t.text)}
            style={{flex:1,fontSize:14,color:t.done?'var(--text-3)':'var(--text-1)',
              textDecoration:t.done?'line-through':'none',letterSpacing:-0.1,lineHeight:1.4}}>
            {t.text}
            {(()=>{const od=t.createdDate&&t.createdDate<TODAY_KEY?t.createdDate:(taskDates[t.id]&&taskDates[t.id]<TODAY_KEY?taskDates[t.id]:null);
              return od&&!t.done?<span style={{marginLeft:6,fontSize:10,fontWeight:700,color:'#FF3B30',
                background:'rgba(255,59,48,0.10)',borderRadius:4,padding:'1px 5px',whiteSpace:'nowrap'}}>
                {Math.round((new Date(TODAY_KEY)-new Date(od))/86400000)}d tarde
              </span>:null;})()}
            {subs.length>0&&<span style={{marginLeft:6,fontSize:11,color:'var(--text-3)',fontWeight:500}}>{subsDone}/{subs.length}</span>}
          </div>}
        <select value={laneId} onChange={e=>moveTask(laneId,e.target.value,t.id)}
          style={{flexShrink:0,maxWidth:isD?94:82,padding:isD?'4px 20px 4px 8px':'3px 18px 3px 7px',
            borderRadius:7,border:'none',background:'var(--fill-1)',color:'var(--text-2)',
            fontSize:isD?11.5:11,fontWeight:600,outline:'none',cursor:'pointer',appearance:'none',
            WebkitAppearance:'none',MozAppearance:'none'}}>
          {LANES.map(l=><option key={l.id} value={l.id}>{l.label}</option>)}
        </select>
        <button onClick={()=>toggleExpand(t.id)} style={{padding:'2px 5px',borderRadius:6,
          background:'var(--fill-1)',border:'none',cursor:'pointer',fontSize:13,color:'var(--text-3)',lineHeight:1}}>
          {isExp?'▾':'▸'}
        </button>
        <button onClick={()=>deleteTask(laneId,t.id)} style={{width:20,height:20,borderRadius:10,flexShrink:0,
          background:'var(--fill-1)',color:'var(--text-3)',display:'flex',alignItems:'center',
          justifyContent:'center',fontSize:13,cursor:'pointer',border:'none'}}>×</button>
      </div>
      {isExp&&<div style={{paddingLeft:40,paddingRight:10,paddingBottom:8,background:'var(--fill-1)',borderRadius:'0 0 10px 10px'}}>
        {subs.map(s=><div key={s.id} style={{display:'flex',alignItems:'center',gap:8,padding:'6px 0'}}>
          <div onClick={()=>toggleSub(laneId,t.id,s.id)} style={{width:16,height:16,borderRadius:8,flexShrink:0,cursor:'pointer',
            border:s.done?'none':`1.5px solid ${laneColor}55`,background:s.done?laneColor:'transparent',
            display:'flex',alignItems:'center',justifyContent:'center',color:'#fff'}}>
            {s.done&&<ICheck size={9}/>}
          </div>
          <div style={{flex:1,fontSize:13,color:s.done?'var(--text-3)':'var(--text-1)',
            textDecoration:s.done?'line-through':'none'}}>{s.text}</div>
          <button onClick={()=>deleteSub(laneId,t.id,s.id)} style={{width:18,height:18,borderRadius:9,
            background:'rgba(0,0,0,0.06)',color:'var(--text-3)',display:'flex',alignItems:'center',
            justifyContent:'center',fontSize:11,cursor:'pointer',border:'none'}}>×</button>
        </div>)}
        <div style={{display:'flex',gap:6,paddingTop:4,alignItems:'center'}}>
          <input value={newSub[t.id]||''} onChange={e=>setNewSub(prev=>({...prev,[t.id]:e.target.value}))}
            onKeyDown={e=>{if(e.key==='Enter')addSub(laneId,t.id);}}
            placeholder="Añadir subtarea…"
            style={{flex:1,fontSize:12,color:'var(--text-1)',background:'transparent',border:'none',outline:'none'}}/>
          <button onClick={()=>addSub(laneId,t.id)} style={{padding:'3px 8px',borderRadius:6,fontSize:11,
            fontWeight:600,background:'var(--fill-2)',color:'var(--text-3)',border:'none',cursor:'pointer'}}>+</button>
        </div>
      </div>}
    </div>;
  }

  const AddCard=<Card radius={16} padding={0}>
    <div style={{display:'flex',alignItems:'center',gap:10,padding:'10px 14px',borderBottom:'0.5px solid var(--separator)'}}>
      <IPlus size={16} style={{color:'var(--accent)',flexShrink:0}}/>
      <input value={newTask} onChange={e=>setNewTask(e.target.value)}
        onKeyDown={e=>e.key==='Enter'&&addTask()} placeholder="Nueva tarea…"
        style={{flex:1,fontSize:14,color:'var(--text-1)',background:'transparent',border:'none',outline:'none'}}/>
      <button onClick={addTask} style={{padding:'5px 12px',borderRadius:8,background:'var(--accent)',
        color:'#fff',fontSize:12,fontWeight:600,border:'none',cursor:'pointer'}}>Añadir</button>
    </div>
    <div style={{display:'flex',gap:2,padding:'8px 10px'}}>
      {LANES.map(l=><button key={l.id} onClick={()=>chooseNewLane(l.id)} style={{flex:1,padding:'5px 8px',
        borderRadius:8,fontSize:12,border:'none',cursor:'pointer',
        background:newLane===l.id?'var(--accent)':'var(--fill-1)',
        color:newLane===l.id?'#fff':'var(--text-3)',fontWeight:newLane===l.id?600:500}}>{l.label}</button>)}
    </div>
  </Card>;

  const CompletedCard=<Card padding={0} radius={isD?20:22}>
    <div style={{display:'flex',justifyContent:'space-between',alignItems:'center',padding:isD?'14px 16px 8px':'14px 18px 8px'}}>
      <div style={{display:'flex',alignItems:'center',gap:8}}>
        <div style={{width:isD?8:6,height:isD?8:6,borderRadius:4,background:'var(--sys-green)'}}/>
        <div style={{fontSize:isD?14:15,fontWeight:600,color:'var(--text-1)',letterSpacing:-0.2}}>Completadas</div>
      </div>
      <div style={{fontSize:12,color:'var(--text-3)'}}>{completedTasks.length}</div>
    </div>
    <div style={{padding:isD?'0 4px 8px':'0 6px 8px'}}>
      {completedTasks.length===0&&<div style={{textAlign:'center',padding:isD?'20px 0':'14px 0',
        fontSize:13,color:'var(--text-3)',fontStyle:'italic'}}>Sin tareas completadas</div>}
      {completedTasks.map(t=>renderTask(t,t.__lane,t.__laneColor))}
    </div>
  </Card>;

  if(isD){
    return<div style={{padding:`0 ${px}px`}}>
      <div style={{marginBottom:16}}>{AddCard}</div>
      <div style={{display:'grid',gridTemplateColumns:'repeat(3,1fr)',gap:16,alignItems:'start'}}>
        {LANES.map(lane=><Card key={lane.id} padding={0} radius={20}>
          <div style={{display:'flex',justifyContent:'space-between',alignItems:'center',padding:'14px 16px 8px'}}>
            <div style={{display:'flex',alignItems:'center',gap:8}}>
              <div style={{width:8,height:8,borderRadius:4,background:lane.color}}/>
              <div style={{fontSize:14,fontWeight:600,color:'var(--text-1)',letterSpacing:-0.2}}>{lane.label}</div>
              {lane.desc&&<span style={{fontSize:11,color:'var(--text-3)'}}>{lane.desc}</span>}
            </div>
            <span style={{fontSize:12,color:'var(--text-3)'}}>{activeTasks[lane.id].length}</span>
          </div>
          <div style={{padding:'0 4px 8px'}}>
            {activeTasks[lane.id].length===0&&<div style={{textAlign:'center',padding:'20px 0',
              fontSize:13,color:'var(--text-3)',fontStyle:'italic'}}>Sin tareas</div>}
            {activeTasks[lane.id].map(t=>renderTask(t,lane.id,lane.color))}
          </div>
        </Card>)}
      </div>
      <div style={{marginTop:16}}>{CompletedCard}</div>
    </div>;
  }
  return<div style={{padding:'0 16px',display:'flex',flexDirection:'column',gap:14}}>
    {AddCard}
    {LANES.map(lane=><Card key={lane.id} padding={0} radius={22}>
      <div style={{display:'flex',justifyContent:'space-between',alignItems:'center',padding:'14px 18px 8px'}}>
        <div style={{display:'flex',alignItems:'center',gap:8}}>
          <div style={{width:6,height:6,borderRadius:3,background:lane.color}}/>
          <div style={{fontSize:15,fontWeight:600,color:'var(--text-1)',letterSpacing:-0.2}}>{lane.label}</div>
          {lane.desc&&<span style={{fontSize:11,color:'var(--text-3)'}}>{lane.desc}</span>}
        </div>
        <div style={{fontSize:12,color:'var(--text-3)'}}>{activeTasks[lane.id].length}</div>
      </div>
      <div style={{padding:'0 6px 8px'}}>
        {activeTasks[lane.id].length===0&&<div style={{textAlign:'center',padding:'14px 0',
          fontSize:13,color:'var(--text-3)',fontStyle:'italic'}}>Sin tareas</div>}
        {activeTasks[lane.id].map(t=>renderTask(t,lane.id,lane.color))}
      </div>
    </Card>)}
    {CompletedCard}
  </div>;
}

function HoyHabitos({habits,setHabits,setHabitTemplate}){
  const isD=useD();
  const[newName,setNewName]=useState('');
  const doneH=habits.filter(h=>h.done).length;
  const pct=habits.length>0?Math.round(doneH/habits.length*100):0;
  function toggle(id){setHabits(prev=>prev.map(h=>h.id===id?{...h,done:!h.done}:h));}
  function addHabit(){if(!newName.trim())return;
    const habit={id:'h'+Date.now(),name:newName.trim()};
    setHabits(prev=>[...(prev||[]),{...habit,done:false}]);
    setHabitTemplate(prev=>[...habitTemplateFromDay(prev),habit]);
    setNewName('');}
  function removeHabit(id){
    setHabits(prev=>prev.filter(h=>h.id!==id));
    setHabitTemplate(prev=>habitTemplateFromDay(prev).filter(h=>h.id!==id));
  }
  const px=isD?52:14;
  return<div style={{padding:`0 ${px}px`,display:'flex',flexDirection:'column',gap:14}}>
    <div style={{display:isD?'grid':'flex',gridTemplateColumns:isD?'280px 1fr':undefined,flexDirection:'column',gap:14,alignItems:isD?'start':'stretch'}}>
      <Card radius={22} padding={20}>
        <div style={{display:'flex',alignItems:'center',gap:16}}>
          <Ring value={doneH} max={habits.length||1} size={90} stroke={9} color="var(--sys-green)">
            <div style={{textAlign:'center'}}>
              <div style={{fontFamily:'ui-rounded,-apple-system,system-ui',fontSize:22,fontWeight:700,
                color:'var(--sys-green)',letterSpacing:-0.8}}>
                {doneH}<span style={{fontSize:13,color:'var(--text-3)',fontWeight:500}}>/{habits.length}</span>
              </div>
            </div>
          </Ring>
          <div style={{flex:1}}>
            <div style={{fontSize:12,color:'var(--text-3)',fontWeight:500,letterSpacing:0.4,textTransform:'uppercase'}}>Hoy</div>
            <div style={{fontSize:20,fontWeight:700,color:'var(--text-1)',letterSpacing:-0.3,marginTop:2}}>{pct}% completado</div>
            <div style={{fontSize:13,color:'var(--text-3)',marginTop:4}}>Objetivo: {(()=>{try{const s=localStorage.getItem('zp_settings');return s?JSON.parse(s).habitGoal||80:80;}catch{return 80;}})()}%</div>
          </div>
        </div>
      </Card>
      <div style={{display:'flex',flexDirection:'column',gap:10,width:'100%'}}>
        <Card radius={16} padding={0}>
          <div style={{display:'flex',alignItems:'center',gap:10,padding:'10px 14px'}}>
            <IPlus size={16} style={{color:'var(--sys-green)',flexShrink:0}}/>
            <input value={newName} onChange={e=>setNewName(e.target.value)}
              onKeyDown={e=>e.key==='Enter'&&addHabit()} placeholder="Nuevo hábito…"
              style={{flex:1,fontSize:14,color:'var(--text-1)',background:'transparent',border:'none'}}/>
            <button onClick={addHabit} style={{padding:'5px 12px',borderRadius:8,
              background:'var(--sys-green)',color:'#fff',fontSize:12,fontWeight:600}}>Añadir</button>
          </div>
        </Card>
        <Card padding={0} radius={22}>
          {habits.length===0&&<div style={{padding:'22px',textAlign:'center',
            fontSize:13,color:'var(--text-3)',fontStyle:'italic'}}>Sin hábitos · pulsa Añadir para crear el primero</div>}
          {habits.map((h,i)=><div key={h.id}
            style={{display:'flex',alignItems:'center',gap:12,padding:'14px 18px',
              borderBottom:i<habits.length-1?'0.5px solid var(--separator)':'none'}}>
            <div onClick={()=>toggle(h.id)} style={{width:24,height:24,borderRadius:7,flexShrink:0,cursor:'pointer',
              border:h.done?'none':'1.5px solid var(--separator-strong)',
              background:h.done?'var(--sys-green)':'transparent',
              display:'flex',alignItems:'center',justifyContent:'center',color:'#fff'}}>
              {h.done&&<ICheck size={14}/>}
            </div>
            <div onClick={()=>toggle(h.id)} style={{flex:1,cursor:'pointer',fontSize:15,
              color:h.done?'var(--text-3)':'var(--text-1)',letterSpacing:-0.2,
              textDecoration:h.done?'line-through':'none'}}>{h.name}</div>
            {h.done&&<div style={{fontSize:10,color:'var(--sys-green)',fontWeight:600}}>+{(10/habits.length).toFixed(2)}</div>}
            <button onClick={()=>removeHabit(h.id)}
              style={{width:26,height:26,borderRadius:13,background:'var(--fill-1)',
                display:'flex',alignItems:'center',justifyContent:'center',
                color:'var(--text-3)',flexShrink:0}}><IClose size={12}/></button>
          </div>)}
        </Card>
      </div>
    </div>
  </div>;
}

function HoyMental({mental,setMental}){
  const isD=useD();
  const[newLabel,setNewLabel]=useState('');
  const goodCount=mental.filter(m=>m.state==='bien').length;
  const badCount=mental.filter(m=>m.state==='mal').length;
  const pendingCount=mental.length-goodCount-badCount;
  const markedCount=goodCount+badCount;
  const score=markedCount>0?+(goodCount/markedCount*10).toFixed(1):0;
  function toggle(id,state){setMental(prev=>prev.map(m=>m.id===id?{...m,state:m.state===state?null:state}:m));}
  function addItem(){if(!newLabel.trim())return;
    const id='m'+Date.now();
    setMental(prev=>[...(prev||[]),{id,label:newLabel.trim(),desc:'',state:null}]);
    setNewLabel('');}
  function removeItem(id){setMental(prev=>prev.filter(m=>m.id!==id));}
  const px=isD?52:14;
  return<div style={{padding:`0 ${px}px`,display:'flex',flexDirection:'column',gap:14}}>
    <div style={{display:isD?'grid':'flex',gridTemplateColumns:isD?'1fr 1fr':undefined,flexDirection:'column',gap:14,alignItems:isD?'start':'stretch'}}>
      <div style={{display:'flex',flexDirection:'column',gap:14,width:'100%'}}>

            <div>
              <div style={{fontSize:12,fontWeight:600,color:'var(--text-3)',letterSpacing:1,textTransform:'uppercase'}}>Control mental</div>
              <div style={{fontFamily:'ui-rounded,-apple-system,system-ui',
                fontSize:56,fontWeight:700,color:scoreHue(score),letterSpacing:-2,lineHeight:1,marginTop:6}}>
                {score.toFixed(1)}<span style={{fontSize:18,color:'var(--text-3)',fontWeight:500}}>/10</span>
              </div>
            </div>
            <Chip tint="var(--sys-green)">{goodCount} bien · {badCount} mal{pendingCount?` · ${pendingCount} pendientes`:''}</Chip>
          </div>
        </Card>
        <Card radius={22} padding={18} style={{background:'var(--surface-ink)',border:'0.5px solid rgba(255,255,255,0.08)'}}>
          <div style={{fontSize:11,fontWeight:600,color:'rgba(255,255,255,0.45)',letterSpacing:1,textTransform:'uppercase',marginBottom:12}}>
            Recordatorios
          </div>
          {['No necesitas operar hoy.','Protege tu capital ante todo.','No persigas el precio.','Sigue tu plan.'].map((r,i)=><div key={i}
            style={{display:'flex',gap:10,padding:'8px 0',borderTop:i>0?'0.5px solid rgba(255,255,255,0.06)':'none'}}>
            <span style={{fontSize:11,color:'rgba(96,165,250,0.8)',minWidth:18}}>0{i+1}</span>
            <span style={{fontSize:13,color:'rgba(255,255,255,0.72)',fontStyle:'italic',lineHeight:1.5}}>{r}</span>
          </div>)}
        </Card>
      </div>
      <div style={{display:'flex',flexDirection:'column',gap:10,width:'100%'}}>
        <Card radius={16} padding={12}>
          <div style={{display:'flex',gap:8,alignItems:'center'}}>

            <button onClick={addItem} disabled={!newLabel.trim()} style={{
              padding:'6px 14px',borderRadius:9,fontSize:12,fontWeight:600,
              background:newLabel.trim()?'var(--sys-green-soft)':'var(--fill-1)',

                fontSize:12,fontWeight:600,cursor:'pointer',border:'none'}}>×</button>
            </div>
          </div>)}
        </Card>
      </div>
    </div>
  </div>;
}

function HoyCierre({cierre,setCierre}){
  const isD=useD();
  const[reflex,setReflex]=useLS('zp_reflexion_'+TODAY_KEY,{aguja:'',bloqueo:'',manana:''});

  const done=cierre.filter(c=>c.d).length;

    const id='c'+Date.now();
    setCierre(prev=>[...(prev||[]),{id,t:newItem.trim(),d:false}]);

    {key:'aguja',label:'¿Qué movió la aguja hoy?',placeholder:'Escribe tu reflexión…'},

              padding:'6px 14px',borderRadius:9,fontSize:12,fontWeight:600,
              background:newItem.trim()?'var(--sys-green-soft)':'var(--fill-1)',
              color:newItem.trim()?'var(--sys-green)':'var(--text-3)',
              cursor:newItem.trim()?'pointer':'default'}}>Añadir</button>
          </div>
        </Card>
        <Card padding={0} radius={22}>
          <div style={{padding:'14px 18px 8px',display:'flex',justifyContent:'space-between',alignItems:'center'}}>
            <div style={{fontSize:15,fontWeight:600,color:'var(--text-1)',letterSpacing:-0.2}}>Checklist de cierre</div>

              textDecoration:it.d?'line-through':'none'}}>{it.t}</div>
