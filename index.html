<!DOCTYPE html>
<html lang="es">
<head>
  <meta charset="UTF-8"/>
  <meta name="viewport" content="width=device-width, initial-scale=1.0"/>
  <title>ExecLog — Diario de Ejecución</title>
  <link rel="preconnect" href="https://fonts.googleapis.com"/>
  <link href="https://fonts.googleapis.com/css2?family=DM+Serif+Display:ital@0;1&family=Space+Grotesk:wght@400;500;600;700&family=Inter:wght@300;400;500;600&family=JetBrains+Mono:wght@400;500;700&display=swap" rel="stylesheet"/>
  <style>
    *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }

    :root {
      /* Clean modern professional palette */
      --accent:       #3B82F6;
      --accent-muted: rgba(59,130,246,0.1);
      --sidebar:      #0D1117;
      --sidebar2:     #161B27;
      --content:      #EEF2F7;
      --card:         #FFFFFF;
      --border:       #E2E8F0;
      --border2:      #CBD5E1;
      --text:         #0F172A;
      --text2:        #475569;
      --text3:        #94A3B8;
      --success:      #059669;
      --success-bg:   rgba(5,150,105,0.08);
      --warning:      #D97706;
      --warning-bg:   rgba(217,119,6,0.08);
      --danger:       #DC2626;
      --danger-bg:    rgba(220,38,38,0.08);

      /* Type */
      --font-serif:   'DM Serif Display', Georgia, serif;
      --font-sans:    'Space Grotesk', sans-serif;
      --font-body:    'Inter', sans-serif;
      --font-mono:    'JetBrains Mono', monospace;
    }

    html, body { height: 100%; overflow: hidden; }
    body {
      font-family: var(--font-body);
      background: var(--content);
      color: var(--text);
      -webkit-font-smoothing: antialiased;
    }
    button, input, textarea, select { font-family: inherit; }
    textarea { resize: vertical; }

    /* Scrollbars */
    ::-webkit-scrollbar { width: 4px; height: 4px; }
    ::-webkit-scrollbar-track { background: transparent; }
    ::-webkit-scrollbar-thumb { background: var(--border2); border-radius: 2px; }

    #root { height: 100vh; display: flex; flex-direction: column; }

    /* ── Keyframe Animations ─────────────────────────── */
    @keyframes checkPop {
      0%   { transform: scale(0.4); opacity: 0; }
      55%  { transform: scale(1.25); }
      80%  { transform: scale(0.92); }
      100% { transform: scale(1); opacity: 1; }
    }
    @keyframes rowFlash {
      0%   { background: rgba(22,101,52,0); }
      30%  { background: rgba(22,101,52,0.12); }
      100% { background: rgba(22,101,52,0); }
    }
    @keyframes slideUp {
      from { opacity: 0; transform: translateY(10px); }
      to   { opacity: 1; transform: translateY(0); }
    }
    @keyframes fadeIn {
      from { opacity: 0; }
      to   { opacity: 1; }
    }
    @keyframes scoreFlip {
      0%   { opacity: 0; transform: translateY(6px) scale(0.97); }
      100% { opacity: 1; transform: translateY(0) scale(1); }
    }
    @keyframes tickerIn {
      from { opacity: 0; transform: translateY(12px); }
      to   { opacity: 1; transform: translateY(0); }
    }
    @keyframes barFill {
      from { transform: scaleX(0); }
      to   { transform: scaleX(1); }
    }
    @keyframes pulseGreen {
      0%, 100% { box-shadow: 0 0 0 0 rgba(22,101,52,0); }
      50%       { box-shadow: 0 0 0 6px rgba(22,101,52,0.15); }
    }

    /* ── Utility classes ─────────────────────────────── */
    .anim-check    { animation: checkPop 0.35s cubic-bezier(0.34,1.56,0.64,1) both; }
    .anim-row      { animation: rowFlash 0.6s ease both; }
    .anim-slideup  { animation: slideUp 0.25s ease both; }
    .anim-fadein   { animation: fadeIn 0.2s ease both; }
    .anim-score    { animation: scoreFlip 0.3s ease both; }
    .anim-ticker   { animation: tickerIn 0.4s cubic-bezier(0.25,0.46,0.45,0.94) both; }
    .anim-bar      { transform-origin: left; animation: barFill 0.5s cubic-bezier(0.4,0,0.2,1) both; }
    .pulse-green   { animation: pulseGreen 0.5s ease both; }

    /* Habit row hover */
    .habit-row {
      transition: background 0.15s, border-color 0.2s, transform 0.1s;
    }
    .habit-row:hover {
      transform: translateX(2px);
    }
    .habit-row.is-done {
      background: rgba(22,101,52,0.04) !important;
      border-color: rgba(22,101,52,0.25) !important;
    }

    /* Tab transitions */
    .tab-content {
      animation: slideUp 0.2s ease both;
    }

    /* ── Shared spacing helpers ─────────────── */
    .section-pad-h    { padding-left: 28px; padding-right: 28px; }
    .section-pad      { padding: 20px 28px; }
    .section-pad-body { padding: 24px 28px; }

    /* ── Responsive — Tablet ────────────────── */
    @media (max-width: 900px) {
      .grid-hoy-dash  { grid-template-columns: 1fr !important; }
      .grid-mensual   { grid-template-columns: 1fr !important; }
      .grid-scorecard { grid-template-columns: 1fr !important; }
    }

    /* ── Responsive — Mobile ────────────────── */
    @media (max-width: 768px) {
      /* ─── App-like global polish ─── */
      html, body {
        background: #F2F4F8 !important;
        overscroll-behavior-y: contain;
        -webkit-text-size-adjust: 100%;
        -webkit-tap-highlight-color: transparent;
        overflow-x: clip; /* clip, no hidden — hidden rompe position:sticky */
      }
      /* Prevent accidental horizontal scroll from wide children */
      #root { max-width: 100vw; overflow-x: clip; }
      /* Softer card look, less borders, more shadows */
      .mobile-card,
      .card-mobile,
      /* Target most card containers */
      [style*="border:1px solid #E2E8F0"][style*="borderRadius:12"],
      [style*="border:\"1px solid #E2E8F0\""][style*="borderRadius:12"] {
        border-color: transparent !important;
        box-shadow: 0 1px 2px rgba(15,23,42,0.04), 0 1px 0 rgba(15,23,42,0.02) !important;
      }
      /* Button press feel */
      button:active { transform: scale(0.97); transition: transform 0.08s; }
      /* Tap ripples */
      button, [role="button"] { -webkit-tap-highlight-color: transparent; touch-action: manipulation; }

      .sidebar-desktop { display: none !important; }
      .mobile-header   { display: flex !important; }
      .mobile-nav      { display: flex !important; }
      .grid-trio       { grid-template-columns: 1fr !important; }
      .grid-2col       { grid-template-columns: 1fr !important; }
      .grid-lanes      { grid-template-columns: 1fr !important; }
      .grid-kpi        { grid-template-columns: repeat(2, 1fr) !important; }
      .grid-weeks12    { grid-template-columns: repeat(6, 1fr) !important; }
      html, body       { overflow: auto; height: auto; }
      #root            { height: auto; min-height: 100vh; }

      .section-pad-h    { padding-left: 16px !important; padding-right: 16px !important; }
      .section-pad      { padding: 16px !important; }
      .section-pad-body { padding: 16px !important; }

      /* Inline-padding overrides */
      .tab-content     { padding-left: 16px !important; padding-right: 16px !important; padding-bottom: 24px !important; }

      /* Calendario day modal full-screen */
      .cal-modal       { width: 100vw !important; max-width: 100vw !important; }
      .cal-cell        { min-height: 60px !important; padding: 6px !important; }

      /* Mobile nav labels shorten */
      .mobile-nav-label-long { display:none !important; }
      .mobile-nav-label-short{ display:inline !important; }

      /* Reduce huge scores on mobile */
      h1               { font-size: 19px !important; }

      /* Weekly 7-col day bars: allow shrink */
      .week-day-grid   { gap: 4px !important; }
      .week-day-grid > div { font-size: 10px !important; }

      /* DoceSemanas: scorecard week pills wrap tight */
      .doce-week-pills button { padding: 7px 10px !important; font-size: 12px !important; min-height: 36px; }

      /* Hoy header compact */
      .hoy-header-wrap h1 { font-size: 19px !important; line-height:1.25 !important; }

      /* Shell mobile header safe area — frosted + sticky */
      .mobile-header {
        padding: 10px 16px !important;
        padding-top: calc(10px + env(safe-area-inset-top)) !important;
        position: sticky; top: 0; z-index: 50;
        background: rgba(13,17,23,0.92) !important;
        backdrop-filter: saturate(180%) blur(20px);
        -webkit-backdrop-filter: saturate(180%) blur(20px);
        border-bottom: 1px solid rgba(255,255,255,0.04) !important;
      }
      /* Bottom nav frosted */
      .mobile-nav {
        padding: 4px 0 env(safe-area-inset-bottom) !important;
        position: sticky; bottom: 0; z-index: 50;
        background: rgba(13,17,23,0.94) !important;
        backdrop-filter: saturate(180%) blur(20px);
        -webkit-backdrop-filter: saturate(180%) blur(20px);
        border-top: 1px solid rgba(255,255,255,0.04) !important;
      }

      /* Buttons with long text wrap gracefully */
      button { max-width: 100%; }

      /* Ajustes color pickers */
      .ajustes-color-row { flex-wrap: wrap !important; }

      /* ─── Mobile UX polish ─────────────── */

      /* Prevent iOS input zoom (min 16px) */
      input[type="text"], input[type="email"], input[type="password"],
      input[type="number"], input[type="search"], input[type="date"],
      input:not([type]), textarea, select {
        font-size: 16px !important;
      }

      /* Larger touch targets — checkboxes and small action buttons */
      button { min-height: 36px; }
      /* Tap-highlight subtle */
      button, [role="button"], a { -webkit-tap-highlight-color: rgba(59,130,246,0.15); }

      /* Scroll fade hints on horizontal tab strips */
      .tab-strip-mobile {
        position: relative;
        scrollbar-width: none;
      }
      .tab-strip-mobile::-webkit-scrollbar { display: none; }

      /* Smoother scroll on iOS */
      .tab-strip-mobile, .doce-week-pills { -webkit-overflow-scrolling: touch; scroll-snap-type: x proximity; }
      .tab-strip-mobile > * { scroll-snap-align: start; }

      /* Cards get a subtle shadow instead of heavy borders */
      /* (kept as-is to not break desktop) */

      /* Modal body padding slimmer */
      .cal-modal .section-pad-h { padding-left: 16px !important; padding-right: 16px !important; }

      /* KPI numbers slightly smaller to fit 2-col */
      .grid-kpi > div > div:nth-child(2) { font-size: 22px !important; }

      /* Mobile nav: sharper active indicator */
      .mobile-nav button {
        position: relative;
        min-height: 52px;
        padding: 8px 1px !important;
      }
      .mobile-nav button[data-active="true"]::before {
        content: '';
        position: absolute;
        top: 0; left: 22%; right: 22%;
        height: 2px; background: var(--accent); border-radius: 0 0 2px 2px;
      }
      /* Tighter with 7 items */
      .mobile-nav { gap: 0 !important; }
    }

    @media (max-width: 480px) {
      .grid-kpi        { grid-template-columns: repeat(2, 1fr) !important; }
      .grid-weeks12    { grid-template-columns: repeat(4, 1fr) !important; }
      .section-pad-h   { padding-left: 14px !important; padding-right: 14px !important; }
      .section-pad     { padding: 14px !important; }
      .section-pad-body{ padding: 14px !important; }
      .tab-content     { padding-left: 14px !important; padding-right: 14px !important; }

      /* Very compact Hoy header */
      .hoy-header-wrap h1 { font-size: 17px !important; }
      h1               { font-size: 17px !important; }

      /* KPI small-screen tweak */
      .grid-kpi > div { padding: 14px 16px !important; border-radius: 14px !important; }
      .grid-kpi > div > div:nth-child(2) { font-size: 22px !important; }

      /* Calendario cells denser */
      .cal-cell        { min-height: 54px !important; padding: 5px !important; }
      .cal-cell > div > span:first-child { font-size: 11px !important; width: 20px !important; height: 20px !important; }

      /* ─── iOS-like bottom-sheet modal ─── */
      .cal-modal {
        height: 92vh !important;
        max-height: 92vh !important;
        border-top-left-radius: 20px !important;
        border-top-right-radius: 20px !important;
        align-self: flex-end !important;
        animation: sheetUp 0.28s cubic-bezier(0.32,0.72,0.15,1) both;
        position: relative;
      }
      .cal-modal::before {
        content: '';
        position: absolute;
        top: 8px; left: 50%;
        transform: translateX(-50%);
        width: 36px; height: 4px;
        background: #CBD5E1;
        border-radius: 3px;
      }

      /* Rounder cards, more breathing room */
      .section-pad-body > div[style*="borderRadius:12"],
      .section-pad-h   > div[style*="borderRadius:12"],
      .tab-content     > div[style*="borderRadius:12"] {
        border-radius: 14px !important;
      }
    }

    @keyframes sheetUp {
      from { transform: translateY(100%); }
      to   { transform: translateY(0); }
    }

    @media (max-width: 768px) {
      /* Modal overlay uses bottom-sheet alignment on mobile */
      .cal-modal-overlay {
        align-items: flex-end !important;
        justify-content: center !important;
      }

      /* Pill-style tab strips (Hoy + 12S tabs) */
      .tab-strip-mobile {
        gap: 6px !important;
        padding-top: 8px !important;
        padding-bottom: 10px !important;
      }
      .tab-strip-mobile > button {
        border-bottom: none !important;
        border-radius: 999px !important;
        background: rgba(15,23,42,0.05) !important;
        padding: 8px 14px !important;
        font-size: 12px !important;
        color: var(--text2) !important;
        flex-shrink: 0;
      }
      .tab-strip-mobile > button[data-active="true"] {
        background: var(--accent) !important;
        color: #fff !important;
        font-weight: 600 !important;
      }

      /* Section "eyebrow" label — smaller & softer on mobile */
      [class*="section-pad-h"] > div > div[style*="letterSpacing:'0.1em'"][style*="textTransform:'uppercase'"]:first-child,
      [class*="section-pad-h"] > div > div[style*="letterSpacing:'0.14em'"]:first-child {
        font-size: 9px !important;
        margin-bottom: 2px !important;
      }

      /* Rounder inputs/selects, iOS-like */
      input:not([type="color"]), textarea, select {
        border-radius: 10px !important;
      }

      /* Softer corners on most cards */
      [style*="borderRadius:12"] { border-radius: 14px !important; }
      [style*="borderRadius:8"]  { border-radius: 10px !important; }

      /* Mobile nav icons slightly larger */
      .mobile-nav svg { width: 19px; height: 19px; }
      .mobile-nav button { padding-top: 8px !important; }
      .mobile-nav span[style*="fontSize:9"] { font-size: 9.5px !important; }

      /* Sticky Hoy section header + tabs (under mobile header) */
      .hoy-sticky-head {
        position: sticky;
        top: calc(62px + env(safe-area-inset-top));
        z-index: 40;
        background: var(--content, #F2F4F8);
      }

      /* Generic: animate tab content fade */
      .tab-content { animation: slideUp 0.2s ease both; }

      /* Remove focus rings in favor of subtle accent border */
      input:focus, textarea:focus, select:focus {
        border-color: var(--accent) !important;
        box-shadow: 0 0 0 3px rgba(59,130,246,0.15) !important;
      }
    }
  </style>

<script>
/* state.js */
// state.js — ExecLog: utilities, defaults, sample data

const DEFAULT_HABITS = [
  { id: 'h1',  name: 'Levantarse temprano',        active: true, startDate: '2026-01-01', endDate: null },
  { id: 'h2',  name: 'Sin móvil primera hora',     active: true, startDate: '2026-01-01', endDate: null },

  { id: 'h12', name: 'Revisión de operaciones',    active: true, startDate: '2026-01-01', endDate: null },
];

const DEFAULT_SETTINGS = {

  showResumenHoy: true,
  showProgresoRapido: true,
  showHabitos: true,
  showControlMental: true,

const SAMPLE_CYCLE = {
  id: 'cycle-1',
  name: 'Ciclo Q2 2026',
  startDate: '2026-04-06',
  vision: 'Convertirme en un trader consistente y rentable, con control emocional sólido y un sistema de trading probado. Generar ingresos pasivos que me den libertad de tiempo en los próximos 3 años.',

function generateSampleData() {
  const today = new Date();
  const days = {};
  const patterns = [
    [true,true,true,true,false,true,true,true,true,true,false,true],   // 10/12 → 8.3
    [true,true,false,true,true,true,true,true,true,true,true,true],    // 11/12 → 9.2
    [true,true,true,true,true,true,false,false,true,true,true,true],   // 10/12 → 8.3
    [true,false,true,false,true,true,true,true,true,true,false,true],  // 9/12  → 7.5
    [true,true,true,true,true,true,true,true,false,true,true,true],    // 11/12 → 9.2
    [true,true,false,true,true,false,true,true,true,true,true,true],   // 10/12 → 8.3
  ];

  for (let i = 6; i >= 1; i--) {
    const d = new Date(today);
    d.setDate(d.getDate() - i);
    const key = d.toISOString().split('T')[0];
    const pat = patterns[(6-i) % patterns.length];
    const habits = {};
    DEFAULT_HABITS.forEach((h, idx) => { habits[h.id] = pat[idx]; });
    const mentals = ['bien','mal'];
    days[key] = {
      type: 'normal',
      habits,
      mentalControl: {
        miedo: mentals[Math.random()>0.3?0:1],
        codicia: mentals[Math.random()>0.4?0:1],
        sesgoVenganza: mentals[Math.random()>0.5?0:1],
        paciencia: mentals[Math.random()>0.3?0:1],
        seguirPlan: mentals[Math.random()>0.3?0:1],

// ---- Utilities ----

function loadFromStorage(key, defaultValue) {
  try {
    const s = localStorage.getItem(key);
    if (s) return JSON.parse(s);
  } catch(e) {}
  return typeof defaultValue === 'function' ? defaultValue() : defaultValue;
}

function saveToStorage(key, value) {
  try { localStorage.setItem(key, JSON.stringify(value)); } catch(e) {}
}

function getDateKey(date) {
  const d = new Date(date);
  return `${d.getFullYear()}-${String(d.getMonth()+1).padStart(2,'0')}-${String(d.getDate()).padStart(2,'0')}`;
}

function getTodayKey() { return getDateKey(new Date()); }

function getActiveHabits(habits, dateStr) {
  return habits.filter(h => {
    if (!h.active) return false;
    if (h.startDate && h.startDate > dateStr) return false;
    if (h.endDate && h.endDate < dateStr) return false;
    return true;
  });
}

function calcDayScore(dayData, habits, dateStr) {
  if (!dayData || dayData.type !== 'normal') return null;
  const active = getActiveHabits(habits, dateStr);
  if (!active.length) return 0;
  const done = active.filter(h => dayData.habits?.[h.id]).length;
  return Math.round((done / active.length) * 10 * 10) / 10;
}

function calcMentalScore(mentalData) {
  if (!mentalData) return null;
  const factors = ['miedo','codicia','sesgoVenganza','paciencia','seguirPlan','gestionRiesgo'];
  const answered = factors.filter(f => mentalData[f]);
  if (!answered.length) return null;
  let score = 5;
  answered.forEach(f => {
    if (mentalData[f] === 'bien') score += 0.83;
    else score -= 0.83;
  });
  return Math.max(0, Math.min(10, Math.round(score * 10) / 10));
}

function getScoreColor(score) {
  if (score === null || score === undefined) return '#94A3B8';
  if (score >= 8) return '#10B981';
  if (score >= 6) return '#F59E0B';
  return '#EF4444';
}

function getScoreBg(score) {
  if (score === null || score === undefined) return 'rgba(148,163,184,0.12)';
  if (score >= 8) return 'rgba(16,185,129,0.1)';
  if (score >= 6) return 'rgba(245,158,11,0.1)';
  return 'rgba(239,68,68,0.1)';
}

function formatDate(dateStr) {
  const d = new Date(dateStr + 'T12:00:00');
  return d.toLocaleDateString('es-ES', { weekday:'long', day:'numeric', month:'long' });
}

function formatShortDate(dateStr) {
  const d = new Date(dateStr + 'T12:00:00');
  return d.toLocaleDateString('es-ES', { day:'numeric', month:'short' });
}

function getWeekDates(weekOffset = 0) {
  const today = new Date();
  const day = today.getDay();
  const monday = new Date(today);
  monday.setDate(today.getDate() - (day === 0 ? 6 : day - 1) + weekOffset * 7);
  const dates = [];
  for (let i = 0; i < 7; i++) {
    const d = new Date(monday);
    d.setDate(monday.getDate() + i);
    dates.push(getDateKey(d));
  }
  return dates;
}

function getCycleWeek(startDate) {
  const start = new Date(startDate + 'T00:00:00');
  const now = new Date();
  const diff = Math.floor((now - start) / (7 * 24 * 3600 * 1000));
  return Math.min(Math.max(diff + 1, 1), 12);
}

function uid() {
  return Math.random().toString(36).slice(2) + Date.now().toString(36);
}

Object.assign(window, {

  generateSampleData, loadFromStorage, saveToStorage,
  getDateKey, getTodayKey, getActiveHabits,
  calcDayScore, calcMentalScore, getScoreColor, getScoreBg,
  formatDate, formatShortDate, getWeekDates, getCycleWeek, uid,
});

  async function cloudSave(userId, patch) {

      .from('user_data')

  function debounce(fn, ms) {
    let t; let lastArgs;
    const wrapped = (...args) => {
      lastArgs = args;
      clearTimeout(t);
      t = setTimeout(() => { t = null; fn(...lastArgs); }, ms);
    };
    wrapped.flush = () => { if (t) { clearTimeout(t); t = null; fn(...lastArgs); } };
    return wrapped;
  }

  function translateAuthError(msg) {
    if (!msg) return 'Error desconocido.';
    const m = msg.toLowerCase();

    if (m.includes('user already registered')) return 'Ya existe una cuenta con ese email.';

    if (m.includes('rate limit')) return 'Demasiados intentos. Espera un momento.';
    if (m.includes('network')) return 'Problema de conexión. Revisa tu internet.';
    return msg;
  }

    cloudLoad,
    cloudSave,

  });
