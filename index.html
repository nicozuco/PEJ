// ── AUTH SCREEN ───────────────────────────────────────────────────────────────
const REMEMBER_KEY='zp_auth_remember';
function loadRemembered(){
  try{const s=localStorage.getItem(REMEMBER_KEY);if(!s)return null;const o=JSON.parse(s);
    return o&&o.enabled?o:null;}catch{return null;}
}
function saveRemembered(email,password){
  try{localStorage.setItem(REMEMBER_KEY,JSON.stringify({enabled:true,email,password}));}catch{}
}
function clearRemembered(){try{localStorage.removeItem(REMEMBER_KEY);}catch{}}

function AuthScreen({dark}){
  const remembered=loadRemembered();
  const[mode,setMode]=useState('login');
  const[email,setEmail]=useState(remembered?.email||'');
  const[password,setPassword]=useState(remembered?.password||'');
  const[confirm,setConfirm]=useState('');
  const[showPwd,setShowPwd]=useState(false);
  const[remember,setRemember]=useState(remembered?true:true);
  const[loading,setLoading]=useState(false);
  const[error,setError]=useState(null);
  const[info,setInfo]=useState(null);

  function reset(){setError(null);setInfo(null);}
  function switchMode(next){setMode(next);reset();setConfirm('');}

  async function submit(e){
    e?.preventDefault?.();
    reset();
    const em=email.trim();
    if(!em||!password){setError('Introduce correo y contraseña.');return;}
    if(!/^[^\s@]+@[^\s@]+\.[^\s@]+$/.test(em)){setError('Correo electrónico no válido.');return;}
    if(mode==='signup'){
      if(password.length<6){setError('La contraseña debe tener al menos 6 caracteres.');return;}
      if(password!==confirm){setError('Las contraseñas no coinciden.');return;}
    }
    setLoading(true);
    try{
      if(mode==='login'){
        const{error}=await sb.auth.signInWithPassword({email:em,password});
        if(error)throw error;
        if(remember)saveRemembered(em,password);else clearRemembered();
      }else{
        const{data,error}=await sb.auth.signUp({email:em,password});
        if(error)throw error;
        if(data.session){
          if(remember)saveRemembered(em,password);else clearRemembered();
        }else{
          setInfo('Cuenta creada. Revisa tu correo para confirmar e inicia sesión.');
          setMode('login');setPassword('');setConfirm('');
        }
      }
    }catch(err){setError(translateAuthError(err));}
    finally{setLoading(false);}
  }

  const inputStyle={width:'100%',padding:'13px 14px',fontSize:15,color:'var(--text-1)',
    background:'var(--fill-1)',border:'0.5px solid var(--hairline)',borderRadius:12,
    letterSpacing:-0.1,outline:'none',transition:'border-color 0.15s'};

  return<div style={{flex:1,minHeight:0,height:'100%',display:'flex',flexDirection:'column',
    alignItems:'center',justifyContent:'center',padding:'24px 18px',position:'relative',overflow:'hidden'}}>
    {/* Ambient gradient backdrop */}
    <div style={{position:'absolute',inset:0,pointerEvents:'none',
      background:`radial-gradient(60% 50% at 30% 20%,${dark?'rgba(94,92,230,0.22)':'rgba(94,92,230,0.18)'},transparent 70%),
                  radial-gradient(50% 40% at 80% 90%,${dark?'rgba(59,130,246,0.20)':'rgba(59,130,246,0.16)'},transparent 70%)`}}/>
    <div style={{width:'100%',maxWidth:380,position:'relative',zIndex:1,
      display:'flex',flexDirection:'column',alignItems:'center',gap:18}}>
      <div style={{display:'flex',flexDirection:'column',alignItems:'center',gap:10,marginBottom:4}}>
        <ZuppejIcon size={56}/>
        <div style={{fontFamily:'ui-rounded,-apple-system,system-ui',fontSize:24,fontWeight:700,
          letterSpacing:-0.4,color:'var(--text-1)'}}>Zuppi's Agenda</div>
        <div style={{fontSize:13,color:'var(--text-3)',textAlign:'center',letterSpacing:-0.1}}>
          {mode==='login'?'Inicia sesión para continuar':'Crea tu cuenta para empezar'}
        </div>
      </div>

      <GlassSurface radius={22} lift={3} tint={dark?'dark':'neutral'}
        style={{width:'100%',padding:'18px 18px 16px'}}>
        <form onSubmit={submit} style={{display:'flex',flexDirection:'column',gap:10}}>
          <div>
            <label style={{fontSize:11,fontWeight:600,color:'var(--text-3)',
              letterSpacing:0.6,textTransform:'uppercase',display:'block',marginBottom:6,paddingLeft:4}}>Correo</label>
            <input type="email" autoComplete="email" inputMode="email"
              value={email} onChange={e=>setEmail(e.target.value)}
              placeholder="tu@correo.com" style={inputStyle}/>
          </div>
          <div>
            <label style={{fontSize:11,fontWeight:600,color:'var(--text-3)',
              letterSpacing:0.6,textTransform:'uppercase',display:'block',marginBottom:6,paddingLeft:4}}>Contraseña</label>
            <div style={{position:'relative'}}>
              <input type={showPwd?'text':'password'}
                autoComplete={mode==='login'?'current-password':'new-password'}
                value={password} onChange={e=>setPassword(e.target.value)}
                placeholder="••••••••" style={{...inputStyle,paddingRight:64}}/>
              <button type="button" onClick={()=>setShowPwd(v=>!v)}
                style={{position:'absolute',right:8,top:'50%',transform:'translateY(-50%)',
                  padding:'6px 10px',borderRadius:8,fontSize:11,fontWeight:600,
                  color:'var(--text-3)',background:'transparent',letterSpacing:0.2}}>
                {showPwd?'Ocultar':'Ver'}
              </button>
            </div>
          </div>
          {mode==='signup'&&<div>
            <label style={{fontSize:11,fontWeight:600,color:'var(--text-3)',
              letterSpacing:0.6,textTransform:'uppercase',display:'block',marginBottom:6,paddingLeft:4}}>Confirmar contraseña</label>
            <input type={showPwd?'text':'password'} autoComplete="new-password"
              value={confirm} onChange={e=>setConfirm(e.target.value)}
              placeholder="••••••••" style={inputStyle}/>
          </div>}

          <label style={{display:'flex',alignItems:'center',gap:8,padding:'2px 4px',cursor:'pointer',userSelect:'none'}}>
            <span onClick={e=>{e.preventDefault();const next=!remember;setRemember(next);if(!next)clearRemembered();}}
              style={{width:18,height:18,borderRadius:6,flexShrink:0,
                background:remember?'var(--accent)':'transparent',
                border:`1.5px solid ${remember?'var(--accent)':'var(--separator-strong)'}`,
                display:'inline-flex',alignItems:'center',justifyContent:'center',
                color:'#fff',transition:'background 0.15s,border-color 0.15s'}}>
              {remember&&<ICheck size={12} sw={2.6}/>}
            </span>
            <input type="checkbox" checked={remember} onChange={e=>{const v=e.target.checked;setRemember(v);if(!v)clearRemembered();}}
              style={{position:'absolute',opacity:0,width:0,height:0,pointerEvents:'none'}}/>
            <span style={{fontSize:13,color:'var(--text-2)',letterSpacing:-0.1}}>Recordar en este dispositivo</span>
          </label>

          {error&&<div style={{padding:'10px 12px',borderRadius:10,fontSize:13,lineHeight:1.4,
            background:'var(--sys-red-soft)',color:'var(--sys-red)',
            border:'0.5px solid rgba(255,59,48,0.3)'}}>{error}</div>}
          {info&&<div style={{padding:'10px 12px',borderRadius:10,fontSize:13,lineHeight:1.4,
            background:'var(--sys-green-soft)',color:'var(--sys-green)',
            border:'0.5px solid rgba(52,199,89,0.3)'}}>{info}</div>}

          <button type="submit" disabled={loading} style={{marginTop:6,padding:'13px 16px',
            borderRadius:12,background:loading?'var(--accent-soft-strong)':'var(--accent)',
            color:'#fff',fontSize:15,fontWeight:600,letterSpacing:-0.1,cursor:loading?'default':'pointer',
            transition:'background 0.15s',display:'flex',alignItems:'center',justifyContent:'center',gap:8}}>
            {loading&&<span style={{width:14,height:14,borderRadius:7,
              border:'2px solid rgba(255,255,255,0.4)',borderTopColor:'#fff',
              animation:'zp-spin 0.7s linear infinite',display:'inline-block'}}/>}
            {loading?(mode==='login'?'Iniciando…':'Creando cuenta…')
              :(mode==='login'?'Iniciar sesión':'Crear cuenta')}
          </button>
        </form>
      </GlassSurface>

      <button onClick={()=>switchMode(mode==='login'?'signup':'login')}
        style={{fontSize:13,color:'var(--text-2)',letterSpacing:-0.1,padding:'6px 10px'}}>
        {mode==='login'
          ?<><span style={{color:'var(--text-3)'}}>¿No tienes cuenta?</span> <span style={{color:'var(--accent)',fontWeight:600}}>Crear cuenta</span></>
          :<><span style={{color:'var(--text-3)'}}>¿Ya tienes cuenta?</span> <span style={{color:'var(--accent)',fontWeight:600}}>Inicia sesión</span></>}
      </button>

      <div style={{fontSize:11,color:'var(--text-3)',letterSpacing:0.1,textAlign:'center',marginTop:4}}>
        Zuppi's Agenda · sesión segura con Supabase
      </div>
    </div>
  </div>;
}

// ── APP ───────────────────────────────────────────────────────────────────────
function App(){
  const[theme,setTheme]=useLS('zp_theme','light');
  const[accent,setAccent]=useLS('zp_accent','blue');
  const[isDesktop,setIsDesktop]=useState(()=>window.innerWidth>=768);
  const[session,setSession]=useState(null);
  const[authReady,setAuthReady]=useState(false);
  const[signingOut,setSigningOut]=useState(false);
  const[syncedFor,setSyncedFor]=useState(null);
  const[syncTick,setSyncTick]=useState(0);
  const dark=theme==='dark';

  useEffect(()=>{
    const fn=()=>{
      try{const t=JSON.parse(localStorage.getItem('zp_theme')||'"light"');setTheme(t);}catch{}
      try{const a=JSON.parse(localStorage.getItem('zp_accent')||'"blue"');setAccent(a);}catch{}
      setSyncTick(x=>x+1);
    };
    window.addEventListener('zp-resync',fn);
    return()=>window.removeEventListener('zp-resync',fn);
  },[setTheme,setAccent]);

  useEffect(()=>{
    let mounted=true;
    sb.auth.getSession().then(({data})=>{
      if(!mounted)return;
      setSession(data.session||null);
      setAuthReady(true);
    }).catch(()=>{if(mounted)setAuthReady(true);});
    const{data:sub}=sb.auth.onAuthStateChange((_e,s)=>{
      if(!mounted)return;
      setSession(s||null);
      setAuthReady(true);
    });
    return()=>{mounted=false;sub.subscription.unsubscribe();};
  },[]);

  // Pull all remote rows on login, then re-hydrate theme/accent from updated localStorage.
  useEffect(()=>{
    if(!authReady)return;
    const uid=session?.user?.id||null;
    if(!uid){setSyncedFor(null);stopRealtime();return;}
    if(syncedFor===uid)return;
    let cancelled=false;
    (async()=>{
      await pullAllRemote(uid);
      ensureRollover(); // Re-run after pull to fix any overwrite from remote data
      if(cancelled)return;
      try{const t=JSON.parse(localStorage.getItem('zp_theme')||'"light"');setTheme(t);}catch{}
      try{const a=JSON.parse(localStorage.getItem('zp_accent')||'"blue"');setAccent(a);}catch{}
      setSyncedFor(uid);
      startRealtime(uid);
    })();
    return()=>{cancelled=true;};
  },[authReady,session?.user?.id,syncedFor,setTheme,setAccent]);

  useEffect(()=>()=>stopRealtime(),[]);

  const handleSignOut=useCallback(async()=>{
    setSigningOut(true);
    try{await sb.auth.signOut();}catch{}
    setSigningOut(false);
  },[]);

  useEffect(()=>{
    const fn=()=>setIsDesktop(window.innerWidth>=768);
    window.addEventListener('resize',fn);return()=>window.removeEventListener('resize',fn);
  },[]);

  useEffect(()=>{
    const a=ACCENTS[accent]||ACCENTS.blue;
    const r=document.documentElement;
    r.style.setProperty('--accent',a.c);
    r.style.setProperty('--accent-soft',a.s);
    r.style.setProperty('--accent-soft-strong',a.ss);
  },[accent]);

  useEffect(()=>{
    const r=document.documentElement;
    if(dark){
      r.style.setProperty('--app-bg','#000');
      r.style.setProperty('--surface-1','#1C1C1E');
      r.style.setProperty('--surface-ink','#0A0A0C');
      r.style.setProperty('--fill-1','rgba(120,120,128,0.24)');
      r.style.setProperty('--fill-2','rgba(120,120,128,0.36)');
      r.style.setProperty('--text-1','#FFFFFF');
      r.style.setProperty('--text-2','rgba(235,235,245,0.78)');
      r.style.setProperty('--text-3','rgba(235,235,245,0.48)');
      r.style.setProperty('--separator','rgba(84,84,88,0.36)');
      r.style.setProperty('--separator-strong','rgba(84,84,88,0.65)');
      r.style.setProperty('--hairline','rgba(255,255,255,0.08)');
      r.style.setProperty('--hairline-top','rgba(255,255,255,0.07)');
      r.style.setProperty('--hairline-bot','rgba(0,0,0,0.4)');
      r.style.setProperty('--glass','rgba(28,30,35,0.66)');
      r.style.setProperty('--shadow-a1','0.2');
      r.style.setProperty('--shadow-a2','0.3');
    }else{
      r.style.setProperty('--app-bg','#F2F2F7');
      r.style.setProperty('--surface-1','#FFFFFF');
      r.style.setProperty('--surface-ink','#111318');
      r.style.setProperty('--fill-1','rgba(120,120,128,0.10)');
      r.style.setProperty('--fill-2','rgba(120,120,128,0.14)');
      r.style.setProperty('--text-1','#0A0D14');
      r.style.setProperty('--text-2','#3A3D46');
      r.style.setProperty('--text-3','#8A8D96');
      r.style.setProperty('--separator','rgba(60,60,67,0.10)');
      r.style.setProperty('--separator-strong','rgba(60,60,67,0.28)');
      r.style.setProperty('--hairline','rgba(60,60,67,0.12)');
      r.style.setProperty('--hairline-top','rgba(255,255,255,0.7)');
      r.style.setProperty('--hairline-bot','rgba(0,0,0,0.04)');
      r.style.setProperty('--glass','rgba(255,255,255,0.72)');
      r.style.setProperty('--shadow-a1','0.04');
      r.style.setProperty('--shadow-a2','0.05');
    }
  },[dark]);

  const user=session?.user||null;
  const dataReady=!session||syncedFor===session.user.id;

  if(!authReady||!dataReady){
    return(
      <div style={{height:'100%',display:'flex',alignItems:'center',justifyContent:'center',
        background:'var(--app-bg)',color:'var(--text-3)',flexDirection:'column',gap:14}}>
        <span style={{width:22,height:22,borderRadius:11,
          border:'2.5px solid var(--fill-2)',borderTopColor:'var(--accent)',
          animation:'zp-spin 0.7s linear infinite',display:'inline-block'}}/>
        <span style={{fontSize:13,letterSpacing:0.2}}>{!authReady?'Cargando sesión…':'Sincronizando datos…'}</span>
      </div>
    );
  }

  if(!session){
    return(
      <DCtx.Provider value={isDesktop}>
        <div style={{height:'100%',width:'100%',display:'flex',flexDirection:'column',
          background:'var(--app-bg)',paddingTop:'env(safe-area-inset-top,0px)',overflow:'hidden'}}>
          <AuthScreen dark={dark}/>
        </div>
      </DCtx.Provider>
    );
  }

  return(
    <AppContent key={`${user.id}-${syncTick}`}
      user={user} isDesktop={isDesktop} dark={dark}
      theme={theme} setTheme={setTheme} accent={accent} setAccent={setAccent}
      onSignOut={handleSignOut} signingOut={signingOut}/>
  );
}

function AppContent({user,isDesktop,dark,theme,setTheme,accent,setAccent,onSignOut,signingOut}){
  const[tab,setTab]=useLS('zp_tab','hoy');
  const initialHabitTemplate=readSyncLocal(HABIT_TEMPLATE_KEY,DEF_HABITS);
  const initialTodayHabits=readSyncLocal('zp_habits_'+TODAY_KEY,null);
  const initialHabitTemplateExists=localStorage.getItem(HABIT_TEMPLATE_KEY)!==null;
  const initialHabitFallback=cleanHabitList(initialHabitTemplate).length?habitTemplateFromDay(initialHabitTemplate):(!initialHabitTemplateExists?latestHabitTemplate():[]);
  const initialTodayMental=readSyncLocal('zp_mental_'+TODAY_KEY,null);
  const initialMentalTemplate=latestMentalTemplate();
  const[habitTemplate,setHabitTemplate]=useLS(HABIT_TEMPLATE_KEY,initialHabitFallback);
  const[habits,setHabits]=useLS('zp_habits_'+TODAY_KEY,
    Array.isArray(initialTodayHabits)&&initialTodayHabits.length?cleanHabitList(initialTodayHabits,{done:false}).map(h=>{
      const original=initialTodayHabits.find(x=>x&&String(x.id)===h.id);
      return{...h,done:!!original?.done};
    }):habitsFromTemplate(initialHabitFallback));
  const[tasks,setTasks]=useLS('zp_tasks_'+TODAY_KEY,DEF_TASKS);
  const[mental,setMental]=useLS('zp_mental_'+TODAY_KEY,
    Array.isArray(initialTodayMental)&&initialTodayMental.length?cleanMentalList(initialTodayMental,{keepState:true}):initialMentalTemplate);
  const[cierre,setCierre]=useLS('zp_cierre_'+TODAY_KEY,DEF_CIERRE);
  const[ideas,setIdeas]=useLS('zp_ideas',DEF_IDEAS);
  const[library,setLibrary]=useLS('zp_library',DEF_LIBRARY);
  const[agendaNotes,setAgendaNotes]=useLS('zp_agenda_notes',DEF_AGENDA_NOTES);
  const[notebook,setNotebook]=useLS('zp_notebook',DEF_NOTEBOOK);
  const[streak]=useLS('zp_streak',0);
  const[calEvents,setCalEvents]=useLS('zp_cal_events',DEF_CAL_EVENTS);
  const[dayTypes,setDayTypes]=useLS('zp_day_types',{});
  const[showSettings,setShowSettings]=useState(false);

  const screenProps={habits,setHabits,setHabitTemplate,tasks,setTasks,mental,setMental,cierre,setCierre,streak,ideas,setIdeas,library,setLibrary,
    agendaNotes,setAgendaNotes,notebook,setNotebook,theme,setTheme,accent,setAccent};

  useEffect(()=>{
    const todayKey='zp_habits_'+TODAY_KEY;
    const hasToday=localStorage.getItem(todayKey)!==null;
    const hasTemplate=localStorage.getItem(HABIT_TEMPLATE_KEY)!==null;
    const template=cleanHabitList(habitTemplate).length?habitTemplateFromDay(habitTemplate):(!hasTemplate?latestHabitTemplate():[]);
    if(!hasTemplate&&Array.isArray(habits)&&habits.length>0)setHabitTemplate(habitTemplateFromDay(habits));
    if((!hasToday||!Array.isArray(habits)||habits.length===0)&&template.length){
      setHabitTemplate(template);
      setHabits(habitsFromTemplate(template));
    }
  },[habitTemplate]);
  useEffect(()=>{
    if(Array.isArray(mental)&&mental.length>0)return;
    const template=latestMentalTemplate();
    if(template.length)setMental(template);
  },[mental,setMental]);

  useEffect(()=>{
    const normalized=normalizeTaskBuckets(tasks);
    if(normalized.changed)setTasks(normalized.tasks);
  },[tasks,setTasks]);
  useEffect(()=>{
    fireCalendarReminders(calEvents);
    const tick=setInterval(()=>fireCalendarReminders(calEvents),30000);
    const onFocus=()=>fireCalendarReminders(calEvents);
    const onVisible=()=>{if(document.visibilityState==='visible')fireCalendarReminders(calEvents);};
    window.addEventListener('focus',onFocus);
    document.addEventListener('visibilitychange',onVisible);
    return()=>{
      clearInterval(tick);
      window.removeEventListener('focus',onFocus);
      document.removeEventListener('visibilitychange',onVisible);
    };
  },[calEvents]);

  const currentTab=TABS.some(t=>t.id===tab)?tab:'ideas';
  const Screen=showSettings
    ?<AjustesScreen theme={theme} setTheme={setTheme} accent={accent} setAccent={setAccent}
        user={user} onSignOut={onSignOut} signingOut={signingOut}
        onBack={isDesktop?undefined:()=>setShowSettings(false)}/>
    :currentTab==='hoy'?<HoyScreen {...screenProps} onSettings={()=>setShowSettings(true)}/>
    :currentTab==='semanal'?<SemanalScreen/>
    :currentTab==='mensual'?<MensualScreen dayTypes={dayTypes} setDayTypes={setDayTypes}/>
    :currentTab==='calendario'?<CalendarioScreen calEvents={calEvents} setCalEvents={setCalEvents}/>
    :currentTab==='notas'?<BlocNotasScreen notebook={notebook} setNotebook={setNotebook} agendaNotes={agendaNotes}/>
    :currentTab==='ideas'?<IdeasScreen ideas={ideas} setIdeas={setIdeas} library={library} setLibrary={setLibrary}/>
    :currentTab==='doce'?<DoceScreen/>
    :null;

  return(
    <DCtx.Provider value={isDesktop}>
      <div style={{height:'100%',width:'100%',display:'flex',flexDirection:'row',background:'var(--app-bg)',
        paddingTop:'env(safe-area-inset-top,0px)',overflow:'hidden'}}>
        {isDesktop&&<Sidebar current={showSettings?'__settings':currentTab} onChange={t=>{setTab(t);setShowSettings(false);}}
          streak={streak} onSettings={()=>setShowSettings(!showSettings)} dark={dark} user={user}/>}
        <div className="zp-main" style={{flex:1,display:'flex',flexDirection:'column',overflow:'hidden',minWidth:0}}>
          {isDesktop
            ?<div style={{flex:1,display:'flex',flexDirection:'column',minHeight:0,overflow:'hidden',alignItems:'stretch'}}>
               <div className="zp-screen-wrap" style={{width:'100%',maxWidth:'var(--content-max)',margin:'0 auto',flex:'1 1 auto',minWidth:0}}>{Screen}</div>
             </div>
            :Screen}
          {!isDesktop&&!showSettings&&<TabBar current={currentTab} onChange={setTab} dark={dark}/>}
        </div>
      </div>
    </DCtx.Provider>
  );
}

ReactDOM.createRoot(document.getElementById('root')).render(<App/>);
</script>
</body>
</html>
