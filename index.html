// ── SEMANAL ───────────────────────────────────────────────────────────────────
function SemanalScreen(){
  const isD=useD();
  const readLS=k=>{try{const s=localStorage.getItem(k);return s&&s!=='undefined'?JSON.parse(s):null;}catch{return null;}};
  const monday=(()=>{const d=new Date(TODAY);const wd=(d.getDay()+6)%7;d.setDate(d.getDate()-wd);d.setHours(0,0,0,0);return d;})();
  const DAY_LABELS=['Lun','Mar','Mié','Jue','Vie','Sáb','Dom'];
  const DAYS=DAY_LABELS.map((lbl,i)=>{
    const dt=new Date(monday);dt.setDate(monday.getDate()+i);
    const key=dateKey(dt.getFullYear(),dt.getMonth(),dt.getDate());
    const isFuture=dt>TODAY&&dt.toDateString()!==TODAY.toDateString();
    const isToday=dt.toDateString()===TODAY.toDateString();
    const h=readLS('zp_habits_'+key);
    const t=readLS('zp_tasks_'+key);
    const mn=readLS('zp_mental_'+key);
    const hAny=Array.isArray(h)&&h.some(x=>x&&x.done);
    const tAny=t&&((t.top3||[]).some(x=>x&&x.done)||(t.enfoque||[]).some(x=>x&&x.done)||(t.parking||[]).some(x=>x&&x.done));
    const mAny=Array.isArray(mn)&&mn.some(x=>x&&(x.state==='bien'||x.state==='mal'));
    let score=null;
    if(!isFuture&&(hAny||tAny||mAny))score=calcScore(h||[],t||{top3:[]},mn||[]);
    return{d:lbl,n:dt.getDate(),score,today:isToday,key};
  });
  const evalD=DAYS.filter(d=>d.score!==null);
  const avg=evalD.length>0?evalD.reduce((a,b)=>a+b.score,0)/evalD.length:null;
  const best=evalD.length>0?Math.max(...evalD.map(d=>d.score)):null;
  const bestDay=best!=null?DAYS.find(d=>d.score===best):null;
  const daysGE8=evalD.filter(d=>d.score>=8).length;
  const weekHabitMap=new Map();
  DAYS.forEach(day=>{
    const dh=readLS('zp_habits_'+day.key);
    if(Array.isArray(dh))dh.forEach(h=>{
      if(h&&h.id&&h.name&&!weekHabitMap.has(h.id))weekHabitMap.set(h.id,{id:h.id,name:h.name});
    });
  });
  if(weekHabitMap.size===0)habitTemplateFromDay(readLS(HABIT_TEMPLATE_KEY)||[]).forEach(h=>weekHabitMap.set(h.id,h));
  const habits=Array.from(weekHabitMap.values()).map(h=>{
    let done=0,total=0;
    DAYS.forEach(day=>{
      const dh=readLS('zp_habits_'+day.key);
      if(Array.isArray(dh)){
        const m=dh.find(x=>x.id===h.id||x.name===h.name);
        if(m){total++;if(m.done)done++;}
      }
    });
    return{name:h.name,done,total:total||7};
  });
  const px=isD?52:14;
  const MES=['ene','feb','mar','abr','may','jun','jul','ago','sep','oct','nov','dic'];
  const lastDay=new Date(monday);lastDay.setDate(monday.getDate()+6);
  const sameMonth=monday.getMonth()===lastDay.getMonth();
  const titleRange=sameMonth
    ?`${monday.getDate()}–${lastDay.getDate()} ${MES[monday.getMonth()]}`
    :`${monday.getDate()} ${MES[monday.getMonth()]} – ${lastDay.getDate()} ${MES[lastDay.getMonth()]}`;
  return<div style={{display:'flex',flexDirection:'column',flex:1,minHeight:0,height:'100%'}}>
    <NavHeader eyebrow={`SEMANA ${getWeekNum()}`} title={titleRange}
      right={<div style={{display:'flex',gap:6}}>
        <GlassPillBtn icon={<IChev size={16} style={{transform:'scaleX(-1)'}}/>}/>
        <GlassPillBtn icon={<IChev size={16}/>}/>
      </div>}/>
    <div className="scroll zp-page" style={{flex:1,minHeight:0,paddingBottom:14}}>
      <div style={{padding:`0 ${px}px`,display:'flex',flexDirection:'column',gap:isD?14:10}}>
        <div style={{display:'grid',gridTemplateColumns:isD?'repeat(4,1fr)':'1fr 1fr',gap:isD?10:8}}>
          <MetricTile label="Media" value={avg!=null?avg.toFixed(1):'—'} unit={avg!=null?'/10':''} color={scoreHue(avg)} sub={avg!=null?'esta semana':'sin datos'}/>
          <MetricTile label="Mejor día" value={best!=null?best.toFixed(1):'—'} color={scoreHue(best)} sub={bestDay?{Lun:'lunes',Mar:'martes',Mié:'miércoles',Jue:'jueves',Vie:'viernes',Sáb:'sábado',Dom:'domingo'}[bestDay.d]:''}/>
          <MetricTile label="Días ≥ 8" value={daysGE8} unit={`/${evalD.length||0}`} color="var(--sys-green)"/>
          <MetricTile label="Evaluados" value={evalD.length} unit="/7" color="var(--accent)"/>
        </div>
        <div style={{display:isD?'grid':'flex',gridTemplateColumns:isD?'1fr 1fr':undefined,flexDirection:'column',gap:isD?14:10}}>
          <Card radius={20} padding={isD?18:14}>
            <div style={{display:'flex',justifyContent:'space-between',alignItems:'center',marginBottom:isD?14:10}}>
              <div style={{fontSize:isD?18:13.5,fontWeight:600,color:'var(--text-1)',letterSpacing:-0.3}}>Rendimiento diario</div>
              <div style={{fontSize:isD?12:11,color:'var(--text-3)'}}>0 → 10</div>
            </div>
            <div style={{display:'grid',gridTemplateColumns:'repeat(7,1fr)',gap:isD?8:5,alignItems:'end'}}>
              {DAYS.map((d,i)=>{
                const pct=d.score!==null?d.score/10:0;
                const col=d.score!==null?scoreHue(d.score):'var(--fill-2)';
                return<div key={i} style={{display:'flex',flexDirection:'column',alignItems:'center',gap:isD?6:4}}>
                  <div style={{fontSize:isD?11:10,color:d.score!==null?col:'var(--text-3)',fontWeight:600}}>
                    {d.score!==null?d.score.toFixed(1):'—'}
                  </div>
                  <div style={{width:'100%',height:isD?86:64,background:'var(--fill-1)',borderRadius:8,
                    display:'flex',alignItems:'flex-end',overflow:'hidden',
                    border:d.today?`1.5px solid ${col}`:'0.5px solid var(--separator)'}}>
                    <div style={{width:'100%',height:d.score!==null?`${pct*100}%`:0,
                      background:`linear-gradient(180deg,${col}cc,${col})`,
                      borderRadius:pct<1?'0 0 7px 7px':8,transition:'height 0.5s'}}/>
                  </div>
                  <div style={{fontSize:isD?11:10,color:d.today?'var(--accent)':'var(--text-3)',fontWeight:d.today?600:500}}>{d.d}</div>
                  <div style={{fontSize:isD?10:9.5,color:'var(--text-3)'}}>{d.n}</div>
                </div>;
              })}
            </div>
          </Card>
          <Card padding={0} radius={20}>
            <div style={{padding:isD?'14px 18px 10px':'10px 14px 8px'}}>
              <div style={{fontSize:isD?18:13.5,fontWeight:600,color:'var(--text-1)',letterSpacing:-0.3}}>Hábitos de la semana</div>
            </div>
            {habits.length===0?(
              <div style={{padding:isD?'18px':'14px',borderTop:'0.5px solid var(--separator)',fontSize:isD?13:12,color:'var(--text-3)',textAlign:'center'}}>
                Aún no has añadido hábitos.
              </div>
            ):habits.map((h,i)=>{
              const pct=h.done/h.total;
              const col=pct>=0.8?'var(--sys-green)':pct>=0.5?'var(--sys-amber)':'var(--sys-red)';
              return<div key={i} style={{padding:isD?'10px 18px':'8px 14px',borderTop:'0.5px solid var(--separator)',
                display:'grid',gridTemplateColumns:isD?'1fr 40px 100px':'1fr 36px 80px',gap:isD?10:8,alignItems:'center'}}>
                <div style={{fontSize:isD?13:12.5,color:'var(--text-1)',overflow:'hidden',textOverflow:'ellipsis',whiteSpace:'nowrap'}}>{h.name}</div>
                <div style={{fontSize:isD?11:10.5,color:col,fontWeight:600,textAlign:'right'}}>{h.done}/{h.total}</div>
                <LinearProgress value={h.done} max={h.total} color={col} thickness={4}/>
              </div>;
            })}
          </Card>
        </div>
        {TODAY.getDay()===0&&<div style={{padding:'12px 16px',borderRadius:16,background:'var(--sys-indigo-soft)',
          border:'0.5px solid var(--sys-indigo-soft-strong)',fontSize:13,color:'var(--sys-indigo)',lineHeight:1.5}}>
          <strong>Review del domingo:</strong> completa la revisión profunda y define el Top 3 de la próxima semana.
        </div>}
      </div>
    </div>
  </div>;
}

// ── MENSUAL ───────────────────────────────────────────────────────────────────
function MonthReflexion({monthKey}){
  const[txt,setTxt]=useLS('zp_month_reflexion_'+monthKey,'');
  return<textarea placeholder="¿Cuál fue el cambio clave este mes?"
    value={txt||''} onChange={e=>setTxt(e.target.value)}
    style={{flex:1,width:'100%',fontSize:14,color:'var(--text-1)',background:'transparent',
      border:'none',outline:'none',resize:'none',lineHeight:1.6,minHeight:80,letterSpacing:-0.15,fontFamily:'inherit'}}/>;
}
function MensualScreen({dayTypes,setDayTypes}){
  const isD=useD();
  const d=TODAY;
  const[vm,setVm]=useState({y:d.getFullYear(),m:d.getMonth()});
  const[selDay,setSelDay]=useState(null);
  const{y,m}=vm;

  const firstDay=new Date(y,m,1);
  const daysInMonth=new Date(y,m+1,0).getDate();
  const firstOffset=(firstDay.getDay()+6)%7;
  const readLS=k=>{try{const s=localStorage.getItem(k);return s&&s!=='undefined'?JSON.parse(s):null;}catch{return null;}};
  function dayScore(key){
    const h=readLS('zp_habits_'+key);
    const t=readLS('zp_tasks_'+key);
    const mn=readLS('zp_mental_'+key);
    const hAny=Array.isArray(h)&&h.some(x=>x&&x.done);
    const tAny=t&&((t.top3||[]).some(x=>x&&x.done)||(t.enfoque||[]).some(x=>x&&x.done)||(t.parking||[]).some(x=>x&&x.done));
    const mAny=Array.isArray(mn)&&mn.some(x=>x&&(x.state==='bien'||x.state==='mal'));
    if(!hAny&&!tAny&&!mAny)return null;
    return calcScore(h||[],t||{top3:[]},mn||[]);
  }
  const days=[];
  for(let i=0;i<firstOffset;i++)days.push({pad:true});
  for(let n=1;n<=daysInMonth;n++){
    const key=dateKey(y,m,n);
    const isToday=n===d.getDate()&&m===d.getMonth()&&y===d.getFullYear();
    const isFuture=new Date(y,m,n)>d;
    const type=dayTypes[key]||null;
    const score=type||isFuture?null:dayScore(key);
    days.push({d:n,score,today:isToday,key,type});
  }
  while(days.length%7)days.push({pad:true});

  const scoredDays=days.filter(c=>!c.pad&&c.score!==null);
  const avg=scoredDays.length>0?(scoredDays.reduce((a,c)=>a+c.score,0)/scoredDays.length).toFixed(1):'—';
  const best=scoredDays.length>0?Math.max(...scoredDays.map(c=>c.score)).toFixed(1):'—';
  const evalCount=scoredDays.length;
  const specialCount=days.filter(c=>!c.pad&&c.type).length;

  function setType(key,type){
    if(type===null){setDayTypes(p=>{const n={...p};delete n[key];return n;});}
    else{setDayTypes(p=>({...p,[key]:type}));}
    setSelDay(null);
  }

  const px=isD?52:14;
  const selKey=selDay?dateKey(y,m,selDay):null;
  const selType=selKey?(dayTypes[selKey]||null):null;

  return<div style={{display:'flex',flexDirection:'column',flex:1,minHeight:0,height:'100%'}}>
    <NavHeader eyebrow="MES" title={`${MONTHS_ES[m].charAt(0).toUpperCase()+MONTHS_ES[m].slice(1)} ${y}`}
      right={<div style={{display:'flex',gap:6}}>
        <GlassPillBtn icon={<IChev size={16} style={{transform:'scaleX(-1)'}}/>}
          onClick={()=>setVm(({y,m})=>m===0?{y:y-1,m:11}:{y,m:m-1})}/>
        <GlassPillBtn icon={<IChev size={16}/>}
          onClick={()=>setVm(({y,m})=>m===11?{y:y+1,m:0}:{y,m:m+1})}/>
      </div>}/>
    <div className="scroll zp-page" style={{flex:1,minHeight:0,paddingBottom:14}}>
      <div style={{padding:`0 ${px}px`,display:'flex',flexDirection:'column',gap:isD?14:10}}>
        <div style={{display:'grid',gridTemplateColumns:isD?'repeat(4,1fr)':'1fr 1fr',gap:isD?10:8}}>
          <MetricTile label="Media" value={avg} unit={avg!=='—'?'/10':''} color={avg!=='—'?scoreHue(+avg):'var(--text-3)'} sub="días evaluados"/>
          <MetricTile label="Mejor día" value={best} color={best!=='—'?scoreHue(+best):'var(--text-3)'}/>
          <MetricTile label="Días eval." value={evalCount} unit={`/${daysInMonth}`} color="var(--accent)"/>
          <MetricTile label="Excluidos" value={specialCount} unit={`/${daysInMonth}`} color="var(--text-3)" sub="fest/vac/mant"/>
        </div>

        {/* Legend */}
        <div style={{display:'flex',gap:8,flexWrap:'wrap'}}>
          {Object.entries(DAY_TYPE_CFG).map(([id,cfg])=><div key={id} style={{display:'flex',alignItems:'center',gap:5,
            padding:'4px 10px',borderRadius:999,background:cfg.soft,border:`0.5px solid ${cfg.color}44`}}>
            <span style={{display:'flex',color:cfg.color}}><cfg.Icon size={12} sw={1.8}/></span>
            <span style={{fontSize:11,fontWeight:600,color:cfg.color}}>{cfg.label}</span>
          </div>)}
          <div style={{display:'flex',alignItems:'center',gap:5,padding:'4px 10px',borderRadius:999,
            background:'var(--fill-1)',border:'0.5px solid var(--hairline)'}}>
            <span style={{fontSize:11,color:'var(--text-3)'}}>Toca un día para marcarlo</span>
          </div>
        </div>

        <div style={{display:isD?'grid':'flex',gridTemplateColumns:isD?'1fr 300px':undefined,flexDirection:'column',gap:isD?14:10}}>
          <Card radius={20} padding={isD?16:10}>
            <div style={{display:'grid',gridTemplateColumns:'repeat(7,1fr)',gap:3,marginBottom:6}}>
              {['L','M','X','J','V','S','D'].map(x=><div key={x} style={{textAlign:'center',fontSize:10.5,
                color:'var(--text-3)',fontWeight:600,letterSpacing:0.2}}>{x}</div>)}
            </div>
            <div style={{display:'grid',gridTemplateColumns:'repeat(7,1fr)',gap:3}}>
              {days.map((c,i)=>{
                if(c.pad)return<div key={i} style={{aspectRatio:'1',opacity:0.3}}/>;
                const sel=selDay===c.d;
                const cfg=c.type?DAY_TYPE_CFG[c.type]:null;
                const col=cfg?cfg.color:c.score!==null?scoreHue(c.score):'var(--fill-1)';
                const bg=sel?'var(--accent)':cfg?cfg.soft:c.score!==null?scoreHueSoft(c.score):'var(--fill-1)';
                const border=sel?'1.5px solid var(--accent)':c.today?'1.5px solid var(--accent)':`0.5px solid ${cfg?cfg.color+'44':'var(--separator)'}`;
                return<div key={i} onClick={()=>setSelDay(sel?null:c.d)}
                  style={{aspectRatio:'1',background:bg,border,borderRadius:9,
                    display:'flex',flexDirection:'column',justifyContent:'space-between',padding:isD?5:3,cursor:'pointer',minHeight:0}}>
                  <div style={{fontSize:isD?11:10.5,fontWeight:sel||c.today?700:600,
                    color:sel?'#fff':c.today?'var(--accent)':cfg?cfg.color:'var(--text-2)',letterSpacing:-0.1,lineHeight:1}}>{c.d}</div>
                  {cfg
                    ?<div style={{display:'flex',justifyContent:'flex-end',color:cfg.color,lineHeight:1}}><cfg.Icon size={isD?10:9} sw={1.8}/></div>
                    :c.score!==null
                      ?<div style={{fontSize:isD?10:9,fontFamily:'ui-rounded,-apple-system,system-ui',
                          fontWeight:700,color:sel?'rgba(255,255,255,0.85)':col,letterSpacing:-0.3,textAlign:'right',lineHeight:1}}>
                          {c.score.toFixed(1)}
                        </div>
                      :<div style={{width:3,height:3,borderRadius:2,background:'var(--separator-strong)',marginLeft:'auto'}}/>}
                </div>;
              })}
            </div>
          </Card>

          <div style={{display:'flex',flexDirection:'column',gap:12}}>
            {selDay&&<Card radius={16} padding={16}>
              <div style={{fontSize:13,fontWeight:600,color:'var(--text-1)',marginBottom:12,letterSpacing:-0.2}}>
                {DAYS_ES[new Date(y,m,selDay).getDay()].charAt(0).toUpperCase()+
                 DAYS_ES[new Date(y,m,selDay).getDay()].slice(1)} {selDay}
                {selType&&(()=>{const C=DAY_TYPE_CFG[selType].Icon;return<span style={{marginLeft:8,fontSize:12,color:DAY_TYPE_CFG[selType].color,display:'inline-flex',alignItems:'center',gap:4,verticalAlign:'middle'}}>
                  · <C size={12} sw={1.8}/> {DAY_TYPE_CFG[selType].label}
                </span>;})()}
              </div>
              <div style={{display:'flex',flexDirection:'column',gap:6}}>
                {Object.entries(DAY_TYPE_CFG).map(([id,cfg])=><button key={id}
                  onClick={()=>setType(selKey,selType===id?null:id)}
                  style={{display:'flex',alignItems:'center',gap:10,padding:'10px 14px',borderRadius:12,
                    background:selType===id?cfg.soft:'var(--fill-1)',
                    border:`0.5px solid ${selType===id?cfg.color+'66':'transparent'}`,
                    textAlign:'left'}}>
                  <span style={{display:'flex',color:cfg.color}}><cfg.Icon size={16} sw={1.8}/></span>
                  <div style={{flex:1}}>
                    <div style={{fontSize:14,fontWeight:600,color:selType===id?cfg.color:'var(--text-1)',letterSpacing:-0.1}}>
                      {cfg.label}
                    </div>
                    <div style={{fontSize:11,color:'var(--text-3)'}}>No cuenta en la puntuación</div>
                  </div>
                  {selType===id&&<ICheck size={14} style={{color:cfg.color}}/>}
                </button>)}
                {selType&&<button onClick={()=>setType(selKey,null)}
                  style={{padding:'8px 14px',borderRadius:10,background:'var(--fill-1)',
                    fontSize:13,color:'var(--text-3)',fontWeight:500,textAlign:'center'}}>
                  Quitar etiqueta
                </button>}
              </div>
            </Card>}

            <Card radius={22} padding={18} style={{display:'flex',flexDirection:'column',gap:12}}>
              <div style={{fontSize:11,fontWeight:600,color:'var(--text-3)',letterSpacing:0.8,textTransform:'uppercase'}}>
                Reflexión del mes
              </div>
              <MonthReflexion key={`${y}-${m}`} monthKey={`${y}-${String(m+1).padStart(2,'0')}`}/>
            </Card>
          </div>
        </div>
      </div>
    </div>
  </div>;
}

// ── CALENDARIO ────────────────────────────────────────────────────────────────
function CalendarioScreen({calEvents,setCalEvents}){
  const isD=useD();
  const d=TODAY;
  const[selDay,setSelDay]=useState(d.getDate());
  const[vm,setVm]=useState({y:d.getFullYear(),m:d.getMonth()});
  const[adding,setAdding]=useState(false);
  const[addingTask,setAddingTask]=useState(false);
  const[editingId,setEditingId]=useState('');
  const[editingBaseKey,setEditingBaseKey]=useState('');
  const[newTime,setNewTime]=useState('');
  const[newTitle,setNewTitle]=useState('');
  const[newColor,setNewColor]=useState('#3B82F6');
  const[newRemind,setNewRemind]=useState(false);
  const[newRepeatUnit,setNewRepeatUnit]=useState('none');
  const[newRepeatEvery,setNewRepeatEvery]=useState(1);
  const[newTaskText,setNewTaskText]=useState('');
  const[newTaskLane,setNewTaskLane]=useState('enfoque');
  const[editTime,setEditTime]=useState('');
  const[editTitle,setEditTitle]=useState('');
  const[editColor,setEditColor]=useState('#3B82F6');
  const[editRemind,setEditRemind]=useState(false);
  const[editRepeatUnit,setEditRepeatUnit]=useState('none');
  const[editRepeatEvery,setEditRepeatEvery]=useState(1);
  const[taskVersion,setTaskVersion]=useState(0);
  const[notifPermission,setNotifPermission]=useState(typeof Notification!=='undefined'?Notification.permission:'unsupported');
  const[pushSubscribed,setPushSubscribed]=useState(false);
  const[pushBusy,setPushBusy]=useState(false);
  const[pushMsg,setPushMsg]=useState('');
  const{y,m}=vm;

  useEffect(()=>{
    let cancelled=false;
    const syncPermission=async()=>{
      const st=await getPushStatus();
      if(cancelled)return;
      setNotifPermission(st.permission);
      setPushSubscribed(!!st.subscribed);
    };
    syncPermission();
    window.addEventListener('focus',syncPermission);
    return()=>{cancelled=true;window.removeEventListener('focus',syncPermission);};
  },[]);
  const firstDay=new Date(y,m,1);
  const daysInMonth=new Date(y,m+1,0).getDate();
  const firstOffset=(firstDay.getDay()+6)%7;
  const days=[];
  for(let i=0;i<firstOffset;i++)days.push({pad:true});
  for(let n=1;n<=daysInMonth;n++){
    const key=dateKey(y,m,n);
    const cnt=getEventsForDate(calEvents,key).length;
    days.push({d:n,today:n===d.getDate()&&m===d.getMonth()&&y===d.getFullYear(),cnt,key});
  }
  while(days.length%7)days.push({pad:true});

  const selKey=dateKey(y,m,selDay);
  const dayEvs=getEventsForDate(calEvents,selKey);
  const dayTasks=React.useMemo(()=>readTasksForDate(selKey),[selKey,taskVersion]);
  const allDayTasks=[
    ...(dayTasks.top3||[]).map(t=>({...t,__lane:'top3'})),
    ...(dayTasks.enfoque||[]).map(t=>({...t,__lane:'enfoque'})),
    ...(dayTasks.parking||[]).map(t=>({...t,__lane:'parking'})),
  ];
  const selLabel=`${DAYS_ES[new Date(y,m,selDay).getDay()].charAt(0).toUpperCase()+
    DAYS_ES[new Date(y,m,selDay).getDay()].slice(1)} ${selDay} ${MONTHS_ES[m]}`;
  const LANE_META={
    top3:{label:'Top 3',color:'var(--accent)'},
    enfoque:{label:'En Foco',color:'var(--sys-purple)'},
    parking:{label:'Parking',color:'var(--text-3)'},
  };
  useEffect(()=>{
    const syncTasks=e=>{
      const k=e?.detail?.key;
      if(!k||k===taskStorageKey(selKey))setTaskVersion(v=>v+1);
    };
    window.addEventListener('zp-ls',syncTasks);
    return()=>window.removeEventListener('zp-ls',syncTasks);
  },[selKey]);

  function resetAddForm(){
    setNewTitle('');setNewTime('');setNewColor('#3B82F6');setNewRemind(false);setNewRepeatUnit('none');setNewRepeatEvery(1);
  }
  function resetTaskForm(){
    setNewTaskText('');setNewTaskLane('enfoque');
  }
  function closeEditor(){
    setEditingId('');setEditingBaseKey('');
    setEditTitle('');setEditTime('');setEditColor('#3B82F6');setEditRemind(false);setEditRepeatUnit('none');setEditRepeatEvery(1);
  }
  function addEvent(){
    if(!newTitle.trim())return;
    const ev={id:'ev'+Date.now(),time:newTime||'00:00',title:newTitle.trim(),color:newColor,
      remind:newRemind,repeatUnit:newRepeatUnit,repeatEvery:newRepeatUnit==='none'?1:Math.max(1,parseInt(newRepeatEvery,10)||1)};
    setCalEvents(p=>({...p,[selKey]:[...(p[selKey]||[]),ev]}));
    resetAddForm();setAdding(false);
  }
  function deleteEvent(baseKey,id){
    setCalEvents(p=>({...p,[baseKey]:(p[baseKey]||[]).filter(e=>e.id!==id)}));
    if(editingId===id&&editingBaseKey===baseKey)closeEditor();
  }
  function addAgendaTask(){
    if(!newTaskText.trim())return;
    if(newTaskLane==='top3'&&(dayTasks.top3||[]).length>=3){alert('Top 3 solo admite 3 tareas.');return;}
    const id='t'+Date.now();
    writeTasksForDate(selKey,prev=>({
      ...prev,
      [newTaskLane]:[...(prev[newTaskLane]||[]),makeTask(id,newTaskText.trim(),selKey,newTaskLane)],
    }));
    resetTaskForm();
    setAddingTask(false);
    setTaskVersion(v=>v+1);
  }
  function toggleAgendaTask(lane,id){
    writeTasksForDate(selKey,prev=>({
      ...prev,
      [lane]:(prev[lane]||[]).map(t=>{
        if(t.id!==id)return t;
        const next=touchTask({...t,done:!t.done},lane);
        if(next.done)recordTaskCompletion(id,next.completedAt||next.updatedAt);
        return next;
      }),
    }));
    setTaskVersion(v=>v+1);
  }
  function moveAgendaTask(fromLane,toLane,id){
    if(fromLane===toLane)return;
    if(toLane==='top3'&&(dayTasks.top3||[]).length>=3){alert('Top 3 solo admite 3 tareas.');return;}
    writeTasksForDate(selKey,prev=>{
      const task=(prev[fromLane]||[]).find(t=>t.id===id);
      if(!task)return prev;
      return{
        ...prev,
        [fromLane]:(prev[fromLane]||[]).filter(t=>t.id!==id),
        [toLane]:[touchTask(task,toLane),...(prev[toLane]||[])],
      };
    });
    setTaskVersion(v=>v+1);
  }
  function deleteAgendaTask(lane,id){
    recordTaskDelete(id);
    writeTasksForDate(selKey,prev=>({
      ...prev,
      [lane]:(prev[lane]||[]).filter(t=>t.id!==id),
    }));
    setTaskVersion(v=>v+1);
  }
  function startEditEvent(ev){
    setAdding(false);
    setAddingTask(false);
    setEditingId(ev.id||'');
    setEditingBaseKey(ev.__baseKey||selKey);
    setEditTime(ev.time||'00:00');
    setEditTitle(ev.title||'');
    setEditColor(ev.color||'#3B82F6');
    setEditRemind(!!ev.remind);
    setEditRepeatUnit(ev.repeatUnit||'none');
    setEditRepeatEvery(Math.max(1,parseInt(ev.repeatEvery,10)||1));
  }
  function saveEditEvent(){
    if(!editingId||!editingBaseKey||!editTitle.trim())return;
    const nextEvery=editRepeatUnit==='none'?1:Math.max(1,parseInt(editRepeatEvery,10)||1);
    setCalEvents(p=>({
      ...p,
      [editingBaseKey]:(p[editingBaseKey]||[]).map(ev=>ev.id===editingId
        ?{...ev,time:editTime||'00:00',title:editTitle.trim(),color:editColor,remind:editRemind,repeatUnit:editRepeatUnit,repeatEvery:nextEvery}
        :ev)
    }));
    closeEditor();
  }
  async function enableNotifications(){
    setPushBusy(true);setPushMsg('');
    try{
      const st=await registerPushSubscription();
      setNotifPermission(st.permission||'granted');
      setPushSubscribed(true);
      setPushMsg('Notificaciones activadas en este dispositivo.');
    }catch(err){
      setPushMsg(err?.message||'No se pudo activar el dispositivo.');
      const st=await getPushStatus();
      setNotifPermission(st.permission);
      setPushSubscribed(!!st.subscribed);
    }finally{setPushBusy(false);}
  }
  async function disableNotifications(){
    setPushBusy(true);setPushMsg('');
    try{
      const st=await unregisterPushSubscription();
      setNotifPermission(st.permission||notifPermission);
      setPushSubscribed(false);
      setPushMsg('Notificaciones desactivadas en este dispositivo.');
    }catch(err){
      setPushMsg(err?.message||'No se pudo desactivar el dispositivo.');
    }finally{setPushBusy(false);}
  }

  const px=isD?52:14;

  const CalGrid=<Card radius={20} padding={isD?14:10}>
    <div style={{display:'flex',justifyContent:'space-between',alignItems:'center',marginBottom:isD?12:8}}>
      <button onClick={()=>{setVm(({y,m})=>m===0?{y:y-1,m:11}:{y,m:m-1});setSelDay(1);}}
        style={{width:28,height:28,borderRadius:14,background:'var(--fill-1)',
          display:'flex',alignItems:'center',justifyContent:'center',color:'var(--text-2)'}}>
        <IChev size={13} style={{transform:'scaleX(-1)'}}/>
      </button>
      <div style={{fontSize:isD?18:13.5,fontWeight:600,color:'var(--text-1)',letterSpacing:-0.3}}>
        {MONTHS_ES[m].charAt(0).toUpperCase()+MONTHS_ES[m].slice(1)} {y}
      </div>
      <button onClick={()=>{setVm(({y,m})=>m===11?{y:y+1,m:0}:{y,m:m+1});setSelDay(1);}}
        style={{width:28,height:28,borderRadius:14,background:'var(--fill-1)',
          display:'flex',alignItems:'center',justifyContent:'center',color:'var(--text-2)'}}>
        <IChev size={13}/>
      </button>
    </div>
    <div style={{display:'grid',gridTemplateColumns:'repeat(7,1fr)',gap:2,marginBottom:4}}>
      {['L','M','X','J','V','S','D'].map(x=><div key={x} style={{textAlign:'center',fontSize:10.5,color:'var(--text-3)',fontWeight:600}}>{x}</div>)}
    </div>
    <div style={{display:'grid',gridTemplateColumns:'repeat(7,1fr)',gap:2}}>
      {days.map((c,i)=>{
        if(c.pad)return<div key={i} style={{aspectRatio:'1'}}/>;
        const sel=c.d===selDay;
        return<div key={i} onClick={()=>setSelDay(c.d)}
          style={{aspectRatio:'1',background:sel?'var(--accent)':c.today?'var(--fill-2)':'transparent',
            borderRadius:sel?11:9,display:'flex',flexDirection:'column',
            alignItems:'center',justifyContent:'center',cursor:'pointer',padding:2}}>
          <div style={{fontSize:isD?14:12.5,fontWeight:sel||c.today?700:500,
            color:sel?'#fff':c.today?'var(--accent)':'var(--text-1)',letterSpacing:-0.2,lineHeight:1}}>{c.d}</div>
          {c.cnt>0&&<div style={{display:'flex',gap:2,marginTop:2}}>
            {Array.from({length:Math.min(c.cnt,3)}).map((_,j)=><div key={j} style={{
              width:3,height:3,borderRadius:2,background:sel?'rgba(255,255,255,0.85)':'var(--accent)'}}/>)}
          </div>}
        </div>;
      })}
    </div>
  </Card>;

  const EventPanel=<div style={{display:'flex',flexDirection:'column',gap:10}}>
    <div style={{display:'flex',justifyContent:'space-between',alignItems:'center',padding:'0 2px'}}>
      <div>
        <div style={{fontSize:15,fontWeight:600,color:'var(--text-1)',letterSpacing:-0.2}}>{selLabel}</div>
        <div style={{fontSize:12,color:'var(--text-3)',marginTop:2}}>{dayEvs.length} evento{dayEvs.length!==1?'s':''} · {allDayTasks.length} tarea{allDayTasks.length!==1?'s':''}</div>
      </div>
      <div style={{display:'flex',alignItems:'center',gap:8}}>
        <button onClick={()=>{setAddingTask(false);setAdding(v=>!v);}} style={{display:'flex',alignItems:'center',gap:6,
          padding:'7px 14px',borderRadius:14,background:'var(--accent)',color:'#fff',
          fontSize:13,fontWeight:600}}>
          <IPlus size={14}/> Evento
        </button>
        <button onClick={()=>{setAdding(false);closeEditor();setAddingTask(v=>!v);}} style={{display:'flex',alignItems:'center',gap:6,
          padding:'7px 14px',borderRadius:14,background:'var(--fill-1)',color:'var(--text-2)',
          fontSize:13,fontWeight:600}}>
          <IPlus size={14}/> Tarea
        </button>
      </div>
    </div>
    <div style={{display:'flex',alignItems:'center',gap:8,flexWrap:'wrap',padding:'0 2px'}}>
      <Chip tint={pushSubscribed?'var(--sys-green)':notifPermission==='denied'?'var(--sys-red)':'var(--sys-amber)'}>
        {pushSubscribed?'Dispositivo suscrito':notifPermission==='denied'?'Avisos bloqueados':'Dispositivo no suscrito'}
      </Chip>
      {pushSupported()&&!pushSubscribed&&notifPermission!=='unsupported'&&<button onClick={enableNotifications} disabled={pushBusy}
        style={{padding:'6px 12px',borderRadius:999,background:'var(--fill-1)',fontSize:12,fontWeight:600,color:'var(--text-2)'}}>
        {pushBusy?'Activando…':'Activar notificaciones'}
      </button>}
      {pushSupported()&&pushSubscribed&&<button onClick={disableNotifications} disabled={pushBusy}
        style={{padding:'6px 12px',borderRadius:999,background:'var(--fill-1)',fontSize:12,fontWeight:600,color:'var(--text-2)'}}>
        {pushBusy?'Quitando…':'Desactivar en este dispositivo'}
      </button>}
      {notifPermission==='unsupported'&&<span style={{fontSize:11,color:'var(--text-3)'}}>Este navegador no soporta avisos locales.</span>}
      {pushMsg&&<span style={{fontSize:11,color:pushSubscribed?'var(--sys-green)':'var(--text-3)'}}>{pushMsg}</span>}
    </div>

    {adding&&<Card radius={16} padding={14}>
      <div style={{display:isD?'flex':'grid',gridTemplateColumns:isD?undefined:'100px 1fr',gap:8,marginBottom:10}}>
        <input value={newTime} onChange={e=>setNewTime(e.target.value)} type="time"
          style={{width:100,fontSize:14,color:'var(--text-1)',background:'var(--fill-1)',
            border:'0.5px solid var(--hairline)',borderRadius:8,padding:'7px 10px'}}/>
        <input value={newTitle} onChange={e=>setNewTitle(e.target.value)} autoFocus
          onKeyDown={e=>e.key==='Enter'&&addEvent()} placeholder="Título del evento…"
          style={{flex:1,fontSize:14,color:'var(--text-1)',background:'var(--fill-1)',
            border:'0.5px solid var(--hairline)',borderRadius:8,padding:'7px 10px'}}/>
      </div>
      <div style={{display:'flex',gap:8,marginBottom:12}}>
        {EVENT_COLORS.map(ec=><button key={ec.id} onClick={()=>setNewColor(ec.hex)}
          style={{width:26,height:26,borderRadius:13,background:ec.hex,
            boxShadow:newColor===ec.hex?`0 0 0 2.5px var(--surface-1),0 0 0 4.5px ${ec.hex}`:'none',
            display:'flex',alignItems:'center',justifyContent:'center'}}>
          {newColor===ec.hex&&<ICheck size={13} style={{color:'#fff'}}/>}
        </button>)}
      </div>
      <div style={{display:'flex',alignItems:'center',justifyContent:'space-between',gap:10,marginBottom:10}}>
        <div>
          <div style={{fontSize:13,fontWeight:600,color:'var(--text-1)'}}>Recordatorio</div>
          <div style={{fontSize:11,color:'var(--text-3)',marginTop:2}}>Saltará en este dispositivo si los avisos están permitidos.</div>
        </div>
        <Toggle value={newRemind} onChange={setNewRemind}/>
      </div>
      <div style={{display:'grid',gridTemplateColumns:isD?'90px 120px 1fr':'84px 110px 1fr',gap:8,marginBottom:12}}>
        <input type="number" min="1" value={newRepeatUnit==='none'?1:newRepeatEvery}
          onChange={e=>setNewRepeatEvery(Math.max(1,parseInt(e.target.value,10)||1))}
          disabled={newRepeatUnit==='none'}
          style={{width:'100%',fontSize:14,color:'var(--text-1)',background:newRepeatUnit==='none'?'var(--fill-1)':'var(--surface-1)',
            border:'0.5px solid var(--hairline)',borderRadius:8,padding:'7px 10px',fontFamily:'inherit'}}/>
        <div style={{display:'flex',alignItems:'center',fontSize:12,color:'var(--text-3)',fontWeight:600}}>Cada</div>
        <select value={newRepeatUnit} onChange={e=>setNewRepeatUnit(e.target.value)}
          style={{width:'100%',fontSize:14,color:'var(--text-1)',background:'var(--fill-1)',
            border:'0.5px solid var(--hairline)',borderRadius:8,padding:'7px 10px',fontFamily:'inherit'}}>
          {REPEAT_UNITS.map(opt=><option key={opt.id} value={opt.id}>{opt.label}</option>)}
        </select>
      </div>
      <div style={{fontSize:11,color:'var(--text-3)',marginBottom:12}}>
        {newRepeatUnit==='none'?'Evento único':repeatSummary({repeatUnit:newRepeatUnit,repeatEvery:newRepeatEvery})}
      </div>
      <div style={{display:'flex',gap:8,justifyContent:'flex-end'}}>
        <button onClick={()=>{resetAddForm();setAdding(false);}} style={{padding:'7px 14px',borderRadius:10,
          background:'var(--fill-1)',fontSize:13,color:'var(--text-3)',fontWeight:500}}>Cancelar</button>
        <button onClick={addEvent} style={{padding:'7px 14px',borderRadius:10,
          background:'var(--accent)',color:'#fff',fontSize:13,fontWeight:600}}>Guardar</button>
      </div>
    </Card>}

    {addingTask&&<Card radius={16} padding={14}>
      <div style={{fontSize:13,fontWeight:700,color:'var(--text-1)',marginBottom:10}}>Tarea para {selLabel.toLowerCase()}</div>
      <div style={{display:isD?'grid':'grid',gridTemplateColumns:isD?'1fr 120px auto':'1fr',gap:8,marginBottom:10}}>
        <input value={newTaskText} onChange={e=>setNewTaskText(e.target.value)}
          onKeyDown={e=>e.key==='Enter'&&addAgendaTask()} placeholder="Qué quieres tener listo ese día…"
          style={{width:'100%',fontSize:14,color:'var(--text-1)',background:'var(--fill-1)',
            border:'0.5px solid var(--hairline)',borderRadius:8,padding:'9px 10px'}}/>
        <select value={newTaskLane} onChange={e=>setNewTaskLane(e.target.value)}
          style={{width:'100%',fontSize:14,color:'var(--text-1)',background:'var(--fill-1)',
            border:'0.5px solid var(--hairline)',borderRadius:8,padding:'9px 10px',fontFamily:'inherit'}}>
          <option value="top3">Top 3</option>
          <option value="enfoque">En Foco</option>
          <option value="parking">Parking</option>
        </select>
        <button onClick={addAgendaTask} style={{padding:'9px 14px',borderRadius:10,background:'var(--accent)',color:'#fff',
          fontSize:13,fontWeight:600,whiteSpace:'nowrap'}}>Guardar tarea</button>
      </div>
      <div style={{fontSize:11,color:'var(--text-3)'}}>
        Si la guardas para mañana, mañana te saldrá en tu vista de tareas automáticamente.
      </div>
    </Card>}

    {!!editingId&&<Card radius={16} padding={14}>
      <div style={{fontSize:13,fontWeight:700,color:'var(--text-1)',marginBottom:10}}>Editar recordatorio</div>
      <div style={{display:isD?'flex':'grid',gridTemplateColumns:isD?undefined:'100px 1fr',gap:8,marginBottom:10}}>
        <input value={editTime} onChange={e=>setEditTime(e.target.value)} type="time"
          style={{width:100,fontSize:14,color:'var(--text-1)',background:'var(--fill-1)',
            border:'0.5px solid var(--hairline)',borderRadius:8,padding:'7px 10px'}}/>
        <input value={editTitle} onChange={e=>setEditTitle(e.target.value)}
          onKeyDown={e=>e.key==='Enter'&&saveEditEvent()} placeholder="Título del evento…"
          style={{flex:1,fontSize:14,color:'var(--text-1)',background:'var(--fill-1)',
            border:'0.5px solid var(--hairline)',borderRadius:8,padding:'7px 10px'}}/>
      </div>
      <div style={{display:'flex',gap:8,marginBottom:12}}>

const HIGHLIGHT_COLORS=[
  {id:'yellow',label:'Amarillo',color:'#FEF08A'},
  {id:'green',label:'Verde',color:'#BBF7D0'},
  {id:'blue',label:'Azul',color:'#BFDBFE'},
  {id:'pink',label:'Rosa',color:'#FBCFE8'},
  {id:'violet',label:'Violeta',color:'#DDD6FE'},
];
function stripHtml(html){
  if(typeof document==='undefined')return String(html||'').replace(/<[^>]*>/g,' ');
  const d=document.createElement('div');
  d.innerHTML=html||'';
  return d.textContent||'';
}
function makeNotebookPage(n){
  const now=new Date().toISOString();
  return{id:'p'+Date.now()+Math.floor(Math.random()*1000),title:`Página ${n}`,html:'',text:'',createdAt:now,updatedAt:now};
}
function BlocNotasScreen({notebook,setNotebook,agendaNotes}){
  const isD=useD();
  const px=isD?52:14;
  const editorRef=useRef(null);
  const data=normalizeNotebook(notebook);
  const pages=data.pages;
  const current=pages.find(p=>p.id===data.currentId)||pages[0]||null;
  const currentIndex=Math.max(0,pages.findIndex(p=>p.id===current?.id));

  useEffect(()=>{
    if(pages.length>0)return;
    const legacy=Object.entries(agendaNotes||{}).filter(([,n])=>n&&!n.deleted&&String(n.text||'').trim());
    if(legacy.length){
      setNotebook({
        pages:legacy.sort((a,b)=>String(a[0]).localeCompare(String(b[0]))).map(([key,n],i)=>({
          id:'p'+key.replaceAll('-','')+i,
          title:`Página ${i+1}`,
          html:String(n.text||'').split('\n').map(line=>line||'<br>').join('<br>'),
          text:String(n.text||''),
          createdAt:n.updatedAt||new Date().toISOString(),
          updatedAt:n.updatedAt||new Date().toISOString(),
        })),
        currentId:null,
      });
    }else{
      const first=makeNotebookPage(1);
      setNotebook({pages:[first],currentId:first.id});
    }
  },[]);

  useEffect(()=>{
    if(editorRef.current&&current&&editorRef.current.innerHTML!==current.html)editorRef.current.innerHTML=current.html||'';
  },[current?.id]);

  function patchNotebook(updater){
    setNotebook(prev=>{
      const n=normalizeNotebook(prev);
      const next=typeof updater==='function'?updater(n):updater;
      return normalizeNotebook(next);
    });
  }
  function selectPage(id){patchNotebook(n=>({...n,currentId:id}));}
  function addPage(){
    patchNotebook(n=>{
      const page=makeNotebookPage((n.pages||[]).length+1);
      return{pages:[...(n.pages||[]),page],currentId:page.id};
    });
  }
  function renamePage(title){
    if(!current)return;
    const clean=title.trim()||`Página ${currentIndex+1}`;
    patchNotebook(n=>({...n,pages:n.pages.map(p=>p.id===current.id?{...p,title:clean,updatedAt:new Date().toISOString()}:p)}));
  }
  function saveEditor(){
    if(!current||!editorRef.current)return;
    const html=editorRef.current.innerHTML;
    const text=stripHtml(html);
    patchNotebook(n=>({...n,pages:n.pages.map(p=>p.id===current.id?{...p,html,text,updatedAt:new Date().toISOString()}:p)}));
  }
  function highlight(color){
    if(!editorRef.current)return;
    editorRef.current.focus();
    try{document.execCommand('styleWithCSS',false,true);document.execCommand('hiliteColor',false,color);}catch{}
    saveEditor();
  }
  function clearHighlight(){
    if(!editorRef.current)return;
    editorRef.current.focus();
    try{document.execCommand('removeFormat',false,null);}catch{}
    saveEditor();
  }

  return<div style={{display:'flex',flexDirection:'column',flex:1,minHeight:0,height:'100%'}}>
    <NavHeader eyebrow="BLOC" title="Bloc de notas" subtitle={`${pages.length} página${pages.length!==1?'s':''}`}/>
    <div className="scroll zp-page" style={{flex:1,minHeight:0,paddingBottom:14}}>
      <div style={{padding:`0 ${px}px`,display:'grid',gridTemplateColumns:isD?'260px minmax(0,1fr)':'1fr',gap:isD?16:12,alignItems:'start'}}>
        <Card radius={22} padding={0}>
          <div style={{display:'flex',alignItems:'center',justifyContent:'space-between',padding:'14px 16px 10px'}}>
            <div style={{fontSize:15,fontWeight:700,color:'var(--text-1)',letterSpacing:-0.2}}>Páginas</div>
            <button onClick={addPage} style={{width:28,height:28,borderRadius:14,background:'var(--accent-soft)',color:'var(--accent)',
              display:'flex',alignItems:'center',justifyContent:'center'}}><IPlus size={14}/></button>
          </div>
          {pages.map((page,i)=>{
            const active=page.id===current?.id;
            return<button key={page.id} onClick={()=>selectPage(page.id)}
              style={{width:'100%',textAlign:'left',padding:'12px 16px',borderTop:i>0?'0.5px solid var(--separator)':'none',
                background:active?'var(--accent-soft)':'transparent',display:'block'}}>
              <div style={{display:'flex',justifyContent:'space-between',alignItems:'center',gap:8,marginBottom:4}}>
                <span style={{fontSize:13,fontWeight:700,color:active?'var(--accent)':'var(--text-1)'}}>{page.title}</span>
                <span style={{fontSize:11,color:'var(--text-3)'}}>{i+1}</span>
              </div>
              <div style={{fontSize:12.5,color:'var(--text-3)',lineHeight:1.35,display:'-webkit-box',
                WebkitLineClamp:2,WebkitBoxOrient:'vertical',overflow:'hidden'}}>{page.text||'Página en blanco'}</div>
            </button>;
          })}
        </Card>

        <Card radius={22} padding={isD?18:14}>
          {current&&<>
            <div style={{display:'flex',justifyContent:'space-between',alignItems:'center',gap:12,marginBottom:12,flexWrap:'wrap'}}>
              <input value={current.title} onChange={e=>renamePage(e.target.value)}
                style={{flex:1,minWidth:160,fontSize:isD?20:17,fontWeight:700,color:'var(--text-1)',letterSpacing:-0.3,
                  background:'transparent',border:'none',outline:'none',fontFamily:'inherit'}}/>
              <Chip tint="var(--accent)">Página {currentIndex+1}</Chip>
            </div>
            <div style={{display:'flex',alignItems:'center',gap:8,flexWrap:'wrap',marginBottom:12}}>
              <span style={{fontSize:12,color:'var(--text-3)',fontWeight:600}}>Subrayar</span>
              {HIGHLIGHT_COLORS.map(c=><button key={c.id} title={c.label} onClick={()=>highlight(c.color)}
                style={{width:28,height:28,borderRadius:14,background:c.color,border:'1px solid rgba(0,0,0,0.08)'}}/>)}
              <button onClick={clearHighlight} style={{padding:'6px 10px',borderRadius:999,background:'var(--fill-1)',
                color:'var(--text-2)',fontSize:12,fontWeight:600}}>Quitar</button>
            </div>
            <div ref={editorRef} contentEditable suppressContentEditableWarning onInput={saveEditor}
              data-placeholder="Escribe aquí como en un libro..."
              style={{width:'100%',minHeight:isD?'calc(100vh - 315px)':390,fontFamily:'ui-rounded,-apple-system,system-ui',
                fontSize:isD?17:16,lineHeight:1.75,color:'var(--text-1)',background:'repeating-linear-gradient(to bottom,var(--surface-1) 0,var(--surface-1) 31px,var(--separator) 32px)',
                border:'0.5px solid var(--hairline)',borderRadius:16,padding:'18px 18px',outline:'none',boxSizing:'border-box',
                whiteSpace:'pre-wrap',overflowWrap:'break-word'}}/>
          </>}
        </Card>
      </div>
    </div>
  </div>;
}

// ── 12 SEMANAS ────────────────────────────────────────────────────────────────
function DoceScreen(){
  const isD=useD();
  const[twelve,setTwelve]=useLS('zp_twelve',null);
  const[focus,setFocus]=useState('');
  const[startDate,setStartDate]=useState(TODAY_KEY);
  const[newTactic,setNewTactic]=useState('');
  const[editTactic,setEditTactic]=useState({i:-1,v:''});
  const[editWeek,setEditWeek]=useState({w:-1,v:''});
  const px=isD?52:14;
  const cycle=twelve&&twelve.startDate?twelve:null;
  const weeks=[];
  let currentWeek=null;
  if(cycle){
    const start=new Date(cycle.startDate);
    const diffDays=Math.floor((TODAY-start)/86400000);
    currentWeek=Math.max(1,Math.min(12,Math.floor(diffDays/7)+1));
    for(let w=1;w<=12;w++){
      const score=cycle.scores&&cycle.scores[w]!=null?cycle.scores[w]:null;
      weeks.push({w,score,current:w===currentWeek});
    }
  }
  const tactics=cycle&&Array.isArray(cycle.tactics)?cycle.tactics:[];
  const scores=weeks.filter(w=>w.score!==null).map(w=>w.score);
  const avg=scores.length>0?Math.round(scores.reduce((a,b)=>a+b,0)/scores.length):null;
  function startCycle(){
    if(!focus.trim()||!startDate)return;
    setTwelve({focus:focus.trim(),startDate,tactics:[],scores:{}});
    setFocus('');
  }
  function endCycle(){
    if(typeof window!=='undefined'&&!window.confirm('¿Terminar el ciclo? Se borrarán los datos.'))return;
    setTwelve(null);
  }
  function addTactic(){
    if(!newTactic.trim())return;
    setTwelve(prev=>({...prev,tactics:[...(prev.tactics||[]),{t:newTactic.trim(),pct:0}]}));
    setNewTactic('');
  }
  function removeTactic(i){
    setTwelve(prev=>({...prev,tactics:(prev.tactics||[]).filter((_,j)=>j!==i)}));
  }
  function commitTactic(){
    const i=editTactic.i;if(i<0)return;
    const n=Math.max(0,Math.min(100,parseInt(editTactic.v,10)||0));
    setTwelve(prev=>({...prev,tactics:(prev.tactics||[]).map((t,j)=>j===i?{...t,pct:n}:t)}));
    setEditTactic({i:-1,v:''});
  }
  function commitWeek(){
    const w=editWeek.w;if(w<0)return;
    const v=editWeek.v.trim();
    setTwelve(prev=>{
      const next={...prev,scores:{...(prev.scores||{})}};
      if(v==='')delete next.scores[w];
      else next.scores[w]=Math.max(0,Math.min(100,parseInt(v,10)||0));
      return next;
    });
    setEditWeek({w:-1,v:''});
  }

  return<div style={{display:'flex',flexDirection:'column',flex:1,minHeight:0,height:'100%'}}>
    <NavHeader eyebrow="CICLO" title="12 semanas" subtitle={cycle&&cycle.focus?`Enfoque: ${cycle.focus}`:'Sin ciclo activo'}
      right={cycle?<button onClick={endCycle} style={{padding:'6px 12px',borderRadius:9,fontSize:12,fontWeight:600,
        background:'var(--fill-1)',color:'var(--text-3)',border:'none',cursor:'pointer'}}>Terminar</button>:null}/>
    <div className="scroll zp-page" style={{flex:1,minHeight:0,paddingBottom:14}}>
      <div style={{padding:`0 ${px}px`,display:'flex',flexDirection:'column',gap:isD?14:10}}>
        {!cycle?(
          <Card radius={20} padding={isD?24:18} style={{display:'flex',flexDirection:'column',gap:14}}>
            <div>
              <div style={{fontSize:isD?15:14,fontWeight:600,color:'var(--text-1)',marginBottom:6}}>Inicia un ciclo de 12 semanas</div>
              <div style={{fontSize:isD?13:12.5,color:'var(--text-3)',lineHeight:1.5}}>
                Define tu enfoque principal y la fecha de inicio. Podrás añadir tácticas y registrar el progreso semanal.
              </div>
            </div>
            <div style={{display:'flex',flexDirection:'column',gap:8}}>
              <div style={{fontSize:11,fontWeight:600,color:'var(--text-3)',letterSpacing:0.6,textTransform:'uppercase'}}>Enfoque</div>
              <input value={focus} onChange={e=>setFocus(e.target.value)}
                placeholder="Ej. Disciplina y plan diario"
                style={{width:'100%',fontSize:14,color:'var(--text-1)',background:'var(--fill-1)',
                  border:'none',outline:'none',borderRadius:10,padding:'10px 12px'}}/>
            </div>
            <div style={{display:'flex',flexDirection:'column',gap:8}}>
              <div style={{fontSize:11,fontWeight:600,color:'var(--text-3)',letterSpacing:0.6,textTransform:'uppercase'}}>Fecha de inicio</div>
              <input type="date" value={startDate} onChange={e=>setStartDate(e.target.value)}
                style={{width:'100%',fontSize:14,color:'var(--text-1)',background:'var(--fill-1)',
                  border:'none',outline:'none',borderRadius:10,padding:'10px 12px',fontFamily:'inherit'}}/>
            </div>
            <button onClick={startCycle} disabled={!focus.trim()||!startDate}
              style={{padding:'12px',borderRadius:12,fontSize:14,fontWeight:600,
                background:focus.trim()&&startDate?'var(--accent)':'var(--fill-1)',
                color:focus.trim()&&startDate?'#fff':'var(--text-3)',border:'none',
                cursor:focus.trim()&&startDate?'pointer':'default'}}>
              Iniciar ciclo
            </button>
          </Card>
        ):(
          <div style={{display:isD?'grid':'flex',gridTemplateColumns:isD?'1fr 1fr':undefined,flexDirection:'column',gap:isD?14:10,alignItems:isD?'start':'stretch'}}>
            <div style={{display:'flex',flexDirection:'column',gap:isD?14:10,width:'100%'}}>
              <Card padding={0} radius={20} style={{overflow:'hidden',width:'100%'}}>
                <div style={{padding:isD?'20px':'14px 16px',background:'linear-gradient(135deg,var(--accent-soft),transparent)'}}>
                  <div style={{display:'flex',alignItems:'center',gap:isD?16:14}}>
                    <Ring value={currentWeek} max={12} size={isD?88:68} stroke={isD?9:8} color="var(--accent)">
                      <div style={{textAlign:'center'}}>
                        <div style={{fontFamily:'ui-rounded,-apple-system,system-ui',fontSize:isD?24:20,fontWeight:700,
                          color:'var(--accent)',letterSpacing:-0.8,lineHeight:1}}>{currentWeek}</div>
                        <div style={{fontSize:isD?9:8.5,color:'var(--text-3)',fontWeight:600}}>/ 12</div>
                      </div>
                    </Ring>
                    <div style={{flex:1,minWidth:0}}>
                      <div style={{fontSize:isD?12:10.5,color:'var(--text-3)',fontWeight:600,letterSpacing:0.4,textTransform:'uppercase'}}>Semana actual</div>
                      <div style={{fontFamily:'ui-rounded,-apple-system,system-ui',fontSize:isD?28:22,fontWeight:700,
                        color:'var(--text-1)',letterSpacing:-0.7,marginTop:2,lineHeight:1.05}}>Semana {currentWeek}</div>
                      <div style={{fontSize:isD?13:12,color:'var(--text-3)',marginTop:2}}>
                        Media · <span style={{color:avg!=null?(avg>=85?'var(--sys-green)':avg>=60?'var(--sys-amber)':'var(--sys-red)'):'var(--text-3)',fontWeight:600}}>{avg!=null?`${avg}%`:'—'}</span>
                      </div>
                    </div>
                  </div>
                </div>
              </Card>
              <Card padding={0} radius={20} style={{width:'100%'}}>
                <div style={{padding:isD?'14px 18px 10px':'10px 14px 6px'}}>
                  <div style={{fontSize:isD?18:13.5,fontWeight:600,color:'var(--text-1)',letterSpacing:-0.3}}>Scorecard — semana {currentWeek}</div>
                  <div style={{fontSize:isD?12:11,color:'var(--text-3)',marginTop:2}}>{tactics.length} tácticas</div>
                </div>
                {tactics.length===0?(
                  <div style={{padding:isD?'18px':'14px',borderTop:'0.5px solid var(--separator)',fontSize:isD?13:12,color:'var(--text-3)',textAlign:'center'}}>
                    Aún no has añadido tácticas.
                  </div>
                ):tactics.map((it,i)=>{
                  const col=it.pct>=80?'var(--sys-green)':it.pct>=50?'var(--sys-amber)':'var(--sys-red)';
                  const editing=editTactic.i===i;
                  return<div key={i} style={{padding:isD?'12px 18px':'10px 14px',display:'grid',gridTemplateColumns:'1fr auto auto',gap:10,
                    borderTop:'0.5px solid var(--separator)',alignItems:'center'}}>
                    <div>
                      <div style={{fontSize:isD?14:13,fontWeight:500,color:'var(--text-1)',letterSpacing:-0.15,marginBottom:isD?6:5}}>{it.t}</div>
                      <LinearProgress value={it.pct} max={100} color={col} thickness={4}/>
                    </div>
                    {editing?<input autoFocus type="number" min="0" max="100" value={editTactic.v}
                      onChange={e=>setEditTactic({i,v:e.target.value})}
                      onBlur={commitTactic}
                      onKeyDown={e=>{if(e.key==='Enter')commitTactic();if(e.key==='Escape')setEditTactic({i:-1,v:''});}}
                      style={{width:54,fontSize:13,padding:'4px 6px',borderRadius:7,
                        background:'var(--fill-1)',color:'var(--text-1)',border:'none',outline:'none',textAlign:'right',fontFamily:'inherit'}}/>
                      :<div onClick={()=>setEditTactic({i,v:String(it.pct)})}
                        style={{fontSize:isD?13:12,color:col,fontWeight:600,cursor:'pointer',padding:'2px 6px',borderRadius:6}}>{it.pct}%</div>}
                    <button onClick={()=>removeTactic(i)} aria-label="Eliminar" style={{
                      width:22,height:22,borderRadius:11,background:'var(--fill-1)',
                      color:'var(--text-3)',display:'flex',alignItems:'center',justifyContent:'center',
                      fontSize:12,fontWeight:600,cursor:'pointer',border:'none'}}>×</button>
                  </div>;
                })}
                <div style={{padding:isD?'12px 18px':'10px 14px',display:'flex',gap:8,alignItems:'center',
                  borderTop:'0.5px solid var(--separator)'}}>
                  <input value={newTactic} onChange={e=>setNewTactic(e.target.value)}
                    onKeyDown={e=>{if(e.key==='Enter')addTactic();}}
                    placeholder="Nueva táctica…"
                    style={{flex:1,fontSize:13,color:'var(--text-1)',background:'transparent',border:'none',outline:'none'}}/>
                  <button onClick={addTactic} disabled={!newTactic.trim()} style={{
                    padding:'5px 12px',borderRadius:8,fontSize:12,fontWeight:600,
                    background:newTactic.trim()?'var(--accent-soft)':'var(--fill-1)',
                    color:newTactic.trim()?'var(--accent)':'var(--text-3)',
                    cursor:newTactic.trim()?'pointer':'default',border:'none'}}>Añadir</button>
                </div>
              </Card>
            </div>
            <Card radius={20} padding={isD?18:14} style={{width:'100%'}}>
              <div style={{fontSize:isD?18:13.5,fontWeight:600,color:'var(--text-1)',letterSpacing:-0.3,marginBottom:isD?14:10}}>Progreso del ciclo</div>
              <div style={{display:'grid',gridTemplateColumns:'repeat(6,1fr)',gap:isD?10:6}}>
                {weeks.map(w=>{
                  const col=w.score===null?'var(--fill-2)':w.score>=85?'var(--sys-green)':w.score>=60?'var(--sys-amber)':'var(--sys-red)';
                  const soft=w.score===null?'var(--fill-1)':w.score>=85?'var(--sys-green-soft)':w.score>=60?'var(--sys-amber-soft)':'var(--sys-red-soft)';
                  const editing=editWeek.w===w.w;
                  return<div key={w.w} onClick={()=>{if(!editing)setEditWeek({w:w.w,v:w.score!=null?String(w.score):''});}}
                    style={{aspectRatio:'1',background:w.score!==null?soft:'var(--fill-1)',
                    border:w.current?`1.5px solid ${col}`:'0.5px solid var(--separator)',borderRadius:11,cursor:'pointer',
                    display:'flex',flexDirection:'column',alignItems:'center',justifyContent:'center',gap:1}}>
                    <div style={{fontSize:isD?10:9.5,color:'var(--text-3)',fontWeight:500,lineHeight:1}}>S{w.w}</div>
                    {editing?<input autoFocus type="number" min="0" max="100" value={editWeek.v}
                      onClick={e=>e.stopPropagation()}
                      onChange={e=>setEditWeek({w:w.w,v:e.target.value})}
                      onBlur={commitWeek}
                      onKeyDown={e=>{if(e.key==='Enter')commitWeek();if(e.key==='Escape')setEditWeek({w:-1,v:''});}}
                      style={{width:'80%',fontSize:isD?13:11,padding:'2px',borderRadius:5,fontFamily:'ui-rounded,-apple-system,system-ui',
                        background:'transparent',color:col,fontWeight:700,border:'none',outline:'none',textAlign:'center'}}/>
                    :<div style={{fontFamily:'ui-rounded,-apple-system,system-ui',fontSize:isD?14:12,fontWeight:700,
                      color:w.score!==null?col:'var(--text-3)',letterSpacing:-0.3,lineHeight:1.1}}>
                      {w.score!==null?`${w.score}%`:'—'}
                    </div>}
                  </div>;
                })}
              </div>
            </Card>
          </div>
        )}
      </div>
    </div>
  </div>;
}

// ── IDEAS ─────────────────────────────────────────────────────────────────────
const STATUSES=[
  {id:'inbox',label:'Inbox',color:'var(--text-3)'},
  {id:'explorando',label:'Explorando',color:'var(--sys-purple)'},
  {id:'progreso',label:'En progreso',color:'var(--sys-amber)'},
  {id:'hecha',label:'Implementada',color:'var(--sys-green)'},
];
const PRIO_COLOR={urgente:'var(--sys-red)',alta:'var(--sys-orange)',media:'var(--accent)',baja:'var(--text-3)'};

function IdeasScreen({ideas,setIdeas,library,setLibrary}){
  const isD=useD();

  function addIdea(){if(!newTitle.trim())return;

  if(isD){
    return<div style={{display:'flex',flexDirection:'column',flex:1,minHeight:0,height:'100%'}}>
      <NavHeader eyebrow="IDEAS" title="Ideas y contenido" right={<div style={{display:'flex',alignItems:'center',gap:8}}>{Segment}<GlassPillBtn icon={<ISearch size={16}/>}/></div>}/>
      <div className="scroll zp-page" style={{flex:1,minHeight:0,paddingBottom:14}}>
        <div style={{padding:`0 ${px}px`,display:'flex',flexDirection:'column',gap:16}}>
          {AddCard}
          {/* Kanban */}
          <div style={{display:'grid',gridTemplateColumns:'repeat(4,1fr)',gap:14,alignItems:'start'}}>
            {STATUSES.map(st=>{
              const col_ideas=ideas.filter(i=>i.status===st.id);
              return<div key={st.id}>
                <div style={{display:'flex',alignItems:'center',gap:8,marginBottom:10,padding:'0 2px'}}>
                  <div style={{width:8,height:8,borderRadius:4,background:st.color}}/>
                  <div style={{fontSize:13,fontWeight:600,color:'var(--text-1)',letterSpacing:-0.1}}>{st.label}</div>
                  <div style={{fontSize:11,color:'var(--text-3)',marginLeft:'auto'}}>{col_ideas.length}</div>
                </div>
                <div style={{display:'flex',flexDirection:'column',gap:10}}>
                  {col_ideas.length===0&&<div style={{padding:'20px 0',textAlign:'center',
                    fontSize:13,color:'var(--text-3)',fontStyle:'italic',
                    borderRadius:14,border:'1px dashed var(--separator)'}}>Vacío</div>}
                  {col_ideas.map(idea=><Card key={idea.id} radius={14} padding={14} style={{cursor:'default'}}>
                    <div style={{display:'flex',justifyContent:'space-between',alignItems:'flex-start',marginBottom:idea.desc?6:8}}>
                      <div style={{fontSize:14,fontWeight:600,color:'var(--text-1)',letterSpacing:-0.2,flex:1,lineHeight:1.3}}>{idea.title}</div>

  return<div style={{display:'flex',flexDirection:'column',flex:1,minHeight:0,height:'100%'}}>
    <NavHeader eyebrow="IDEAS" title="Ideas" right={Segment}/>
    <div className="scroll zp-page" style={{flex:1,minHeight:0,paddingBottom:14}}>
      <div style={{padding:'0 14px',display:'flex',flexDirection:'column',gap:10}}>
        {AddCard}
        <div style={{display:'flex',gap:8,overflowX:'auto',marginRight:-14,paddingRight:14}} className="scroll">
          {STATUSES.map(s=>{const count=ideas.filter(i=>i.status===s.id).length;
            return<div key={s.id} style={{flexShrink:0,padding:'8px 12px',borderRadius:12,
              background:'var(--surface-1)',border:'0.5px solid var(--hairline)',minWidth:86}}>
              <div style={{display:'flex',alignItems:'center',gap:6,marginBottom:2}}>
                <div style={{width:6,height:6,borderRadius:3,background:s.color}}/>
                <div style={{fontSize:10.5,color:'var(--text-3)',fontWeight:500}}>{s.label}</div>

              <div style={{fontFamily:'ui-rounded,-apple-system,system-ui',fontSize:20,fontWeight:700,
                color:'var(--text-1)',letterSpacing:-0.5,lineHeight:1}}>{count}</div>
            </div>;
          })}
        </div>
        <Card padding={0} radius={20}>
          {ideas.length===0&&<div style={{padding:'24px',textAlign:'center',fontSize:13,color:'var(--text-3)',fontStyle:'italic'}}>Sin ideas todavía</div>}
          {ideas.map((idea,i)=>{
            const status=STATUSES.find(s=>s.id===idea.status)||STATUSES[0];
            return<div key={idea.id} style={{padding:'12px 14px',borderTop:i>0?'0.5px solid var(--separator)':'none'}}>
              <div style={{display:'flex',justifyContent:'space-between',gap:10,alignItems:'flex-start',marginBottom:4}}>
                <div style={{fontSize:14,fontWeight:600,color:'var(--text-1)',letterSpacing:-0.2,flex:1,lineHeight:1.3}}>{idea.title}</div>
                <div style={{width:7,height:7,borderRadius:4,background:PRIO_COLOR[idea.prio]||'var(--text-3)',

// ── CONTENIDO ────────────────────────────────────────────────────────────────
const CONTENT_TYPES=[
  {id:'video',label:'Video',color:'var(--sys-red)'},
  {id:'articulo',label:'Artículo',color:'var(--accent)'},
  {id:'podcast',label:'Podcast',color:'var(--sys-purple)'},
  {id:'curso',label:'Curso',color:'var(--sys-green)'},
  {id:'otro',label:'Otro',color:'var(--text-3)'},
];
const CONTENT_STATUS=[
  {id:'pendiente',label:'Pendiente',color:'var(--sys-amber)'},
  {id:'visto',label:'Visto',color:'var(--sys-green)'},
  {id:'favorito',label:'Favorito',color:'var(--sys-red)'},
];
function contentHost(url){
  try{return new URL(url).hostname.replace(/^www\./,'');}catch{return'';}
}
function inferContentType(url){
  const h=contentHost(url);
  if(/youtube|youtu\.be|tiktok|vimeo|instagram/.test(h))return'video';
  if(/spotify|podcasts|ivoox|apple/.test(h))return'podcast';
  if(/udemy|coursera|domestika|skillshare/.test(h))return'curso';
  return'articulo';
}
function normalizeUrl(url){
  const v=(url||'').trim();
  if(!v)return'';
  if(/^https?:\/\//i.test(v))return v;
  return`https://${v}`;
}
function ContentScreen({library,setLibrary,embedded=false}){
  const isD=useD();
  const[adding,setAdding]=useState(false);
  const[filter,setFilter]=useState('todos');
  const[url,setUrl]=useState('');
  const[title,setTitle]=useState('');
  const[topic,setTopic]=useState('');
  const[note,setNote]=useState('');
  const[type,setType]=useState('video');
  const[tags,setTags]=useState('');
  const px=isD?52:14;
  const items=(library||[]).slice().sort((a,b)=>(b.createdAt||0)-(a.createdAt||0));
  const topics=Array.from(new Set(items.map(x=>(x.topic||'').trim()).filter(Boolean))).sort((a,b)=>a.localeCompare(b,'es'));
  const shown=filter==='todos'?items:items.filter(x=>x.type===filter||x.status===filter||`tema:${x.topic}`===filter);
  const counts={
    todos:items.length,
    pendiente:items.filter(x=>x.status!=='visto').length,
    favorito:items.filter(x=>x.status==='favorito').length,
    video:items.filter(x=>x.type==='video').length,
  };
  function resetForm(){setUrl('');setTitle('');setTopic('');setNote('');setType('video');setTags('');}
  function addContent(){
    const cleanUrl=normalizeUrl(url);
    const cleanTitle=title.trim()||contentHost(cleanUrl)||'Contenido guardado';
    if(!cleanUrl&&!cleanTitle)return;
    const finalType=type||inferContentType(cleanUrl);
    setLibrary(prev=>[{
      id:'c'+Date.now(),
      title:cleanTitle,
      url:cleanUrl,
      topic:topic.trim(),
      note:note.trim(),
      type:finalType,
      status:'pendiente',
      tags:tags.split(',').map(t=>t.trim()).filter(Boolean),
      createdAt:Date.now(),
    },...(prev||[])]);
    resetForm();setAdding(false);
  }
  function patchItem(id,patch){setLibrary(prev=>(prev||[]).map(x=>x.id===id?{...x,...patch,updatedAt:Date.now()}:x));}
  function removeItem(id){setLibrary(prev=>(prev||[]).filter(x=>x.id!==id));}
  function openItem(item){if(item.url)window.open(item.url,'_blank','noopener,noreferrer');}

  const FilterRow=<div style={{display:'flex',gap:8,overflowX:'auto',paddingBottom:2}} className="scroll">
    {[
      {id:'todos',label:'Todo',count:counts.todos,color:'var(--accent)'},
      {id:'pendiente',label:'Pendiente',count:counts.pendiente,color:'var(--sys-amber)'},
      {id:'favorito',label:'Favoritos',count:counts.favorito,color:'var(--sys-red)'},
      {id:'video',label:'Videos',count:counts.video,color:'var(--sys-red)'},
      ...CONTENT_TYPES.filter(t=>t.id!=='video').map(t=>({...t,count:items.filter(x=>x.type===t.id).length})),
      ...topics.map(t=>({id:`tema:${t}`,label:t,count:items.filter(x=>x.topic===t).length,color:'var(--sys-indigo)'})),
    ].map(f=><button key={f.id} onClick={()=>setFilter(f.id)}
      style={{display:'flex',alignItems:'center',gap:7,padding:isD?'7px 12px':'6px 10px',
        borderRadius:999,background:filter===f.id?f.color:'var(--fill-1)',
        color:filter===f.id?'#fff':'var(--text-2)',fontSize:isD?13:12,fontWeight:600,whiteSpace:'nowrap'}}>
      {f.label}<span style={{opacity:filter===f.id?0.85:0.55}}>{f.count}</span>
    </button>)}
  </div>;

  const AddCard=adding?<Card radius={18} padding={14}>
    <div style={{display:'grid',gridTemplateColumns:isD?'1.4fr 1fr 1fr 150px':'1fr',gap:10,marginBottom:10}}>
      <input value={url} onChange={e=>{setUrl(e.target.value);if(!type)setType(inferContentType(e.target.value));}}
        onBlur={()=>{if(url&&!title)setType(inferContentType(url));}}
        placeholder="Pega un enlace…"
        style={{fontSize:14,color:'var(--text-1)',background:'var(--fill-1)',border:'none',borderRadius:10,padding:'10px 12px'}}/>
      <input value={title} onChange={e=>setTitle(e.target.value)}
        onKeyDown={e=>e.key==='Enter'&&addContent()}
        placeholder="Título"
        style={{fontSize:14,color:'var(--text-1)',background:'var(--fill-1)',border:'none',borderRadius:10,padding:'10px 12px'}}/>
      <input value={topic} onChange={e=>setTopic(e.target.value)}
        onKeyDown={e=>e.key==='Enter'&&addContent()}
        placeholder="Tema"
        style={{fontSize:14,color:'var(--text-1)',background:'var(--fill-1)',border:'none',borderRadius:10,padding:'10px 12px'}}/>
      <select value={type} onChange={e=>setType(e.target.value)}
        style={{fontSize:14,color:'var(--text-1)',background:'var(--fill-1)',border:'none',borderRadius:10,padding:'10px 12px'}}>
        {CONTENT_TYPES.map(t=><option key={t.id} value={t.id}>{t.label}</option>)}
      </select>
    </div>
    <textarea value={note} onChange={e=>setNote(e.target.value)}
      placeholder="Nota rápida…"
      style={{width:'100%',minHeight:70,fontSize:13,color:'var(--text-1)',background:'var(--fill-1)',border:'none',
        borderRadius:10,padding:'10px 12px',resize:'vertical',marginBottom:10}}/>
    <div style={{display:'flex',gap:8,alignItems:'center'}}>
      <input value={tags} onChange={e=>setTags(e.target.value)} placeholder="Tags separados por coma"
        style={{flex:1,fontSize:13,color:'var(--text-1)',background:'transparent',border:'none'}}/>
      <button onClick={()=>{resetForm();setAdding(false);}} style={{padding:'7px 13px',borderRadius:10,background:'var(--fill-1)',fontSize:13,color:'var(--text-3)',fontWeight:600}}>Cancelar</button>
      <button onClick={addContent} style={{padding:'7px 13px',borderRadius:10,background:'var(--accent)',color:'#fff',fontSize:13,fontWeight:600}}>Guardar</button>
    </div>
  </Card>:<button onClick={()=>setAdding(true)}
    style={{display:'flex',alignItems:'center',gap:10,padding:'12px 16px',borderRadius:16,
      background:'var(--fill-1)',border:'0.5px solid var(--hairline)',width:'100%',textAlign:'left'}}>
    <span style={{color:'var(--accent)'}}><IContent size={18}/></span>
    <span style={{flex:1,fontSize:14,color:'var(--text-3)',letterSpacing:-0.1}}>Guardar video, artículo o enlace…</span>
    <span style={{color:'var(--text-3)'}}><IPlus size={16}/></span>
  </button>;

  const ItemList=<Card padding={0} radius={20}>
    {shown.length===0&&<div style={{padding:'28px',textAlign:'center',fontSize:13,color:'var(--text-3)',fontStyle:'italic'}}>
      No hay contenido en esta vista.
    </div>}
    {shown.map((item,i)=>{
      const typeMeta=CONTENT_TYPES.find(t=>t.id===item.type)||CONTENT_TYPES[4];
      const statusMeta=CONTENT_STATUS.find(s=>s.id===item.status)||CONTENT_STATUS[0];
      return<div key={item.id} style={{padding:isD?'14px 18px':'12px 14px',borderTop:i>0?'0.5px solid var(--separator)':'none'}}>
        <div style={{display:'flex',gap:12,alignItems:'flex-start'}}>
          <button onClick={()=>openItem(item)} style={{width:38,height:38,borderRadius:11,background:`${typeMeta.color}22`,
            color:typeMeta.color,display:'flex',alignItems:'center',justifyContent:'center',flexShrink:0}}>
            <IContent size={19}/>
          </button>
          <div style={{flex:1,minWidth:0}}>
            <div onClick={()=>openItem(item)} style={{fontSize:isD?15:14,fontWeight:700,color:'var(--text-1)',letterSpacing:-0.25,
              lineHeight:1.3,cursor:item.url?'pointer':'default'}}>{item.title}</div>
            <div style={{display:'flex',gap:6,alignItems:'center',flexWrap:'wrap',marginTop:6}}>
              <Chip tint={typeMeta.color}>{typeMeta.label}</Chip>
              <Chip tint={statusMeta.color}>{statusMeta.label}</Chip>
              {item.topic&&<Chip tint="var(--sys-indigo)">{item.topic}</Chip>}
              {item.url&&<span style={{fontSize:11,color:'var(--text-3)'}}>{contentHost(item.url)}</span>}
            </div>
            {item.note&&<div style={{fontSize:12.5,color:'var(--text-2)',lineHeight:1.45,marginTop:8}}>{item.note}</div>}
            {Array.isArray(item.tags)&&item.tags.length>0&&<div style={{display:'flex',gap:5,flexWrap:'wrap',marginTop:8}}>
              {item.tags.map(t=><span key={t} style={{fontSize:10.5,color:'var(--text-3)',background:'var(--fill-1)',borderRadius:999,padding:'2px 7px'}}>{t}</span>)}
            </div>}
          </div>
          <div style={{display:'flex',gap:5,flexShrink:0}}>
            <button onClick={()=>patchItem(item.id,{status:item.status==='visto'?'pendiente':'visto'})}
              style={{width:28,height:28,borderRadius:14,background:'var(--fill-1)',color:item.status==='visto'?'var(--sys-green)':'var(--text-3)',display:'flex',alignItems:'center',justifyContent:'center'}}>
              <ICheck size={14}/>
            </button>
            <button onClick={()=>patchItem(item.id,{status:item.status==='favorito'?'pendiente':'favorito'})}
              style={{width:28,height:28,borderRadius:14,background:'var(--fill-1)',color:item.status==='favorito'?'var(--sys-red)':'var(--text-3)',fontSize:14,fontWeight:700}}>★</button>
            <button onClick={()=>removeItem(item.id)}
              style={{width:28,height:28,borderRadius:14,background:'var(--fill-1)',color:'var(--text-3)',display:'flex',alignItems:'center',justifyContent:'center'}}>
              <IClose size={12}/>
            </button>
          </div>
        </div>
      </div>;
    })}
  </Card>;

  const Body=<div className="scroll zp-page" style={{flex:1,minHeight:0,paddingBottom:14}}>
      <div style={{padding:`0 ${px}px`,display:'flex',flexDirection:'column',gap:isD?14:10}}>
        <div style={{display:isD?'grid':'flex',gridTemplateColumns:isD?'1fr 240px':undefined,flexDirection:'column',gap:isD?14:10}}>
          <div style={{display:'flex',flexDirection:'column',gap:isD?14:10}}>
            {AddCard}
            {FilterRow}
            {ItemList}
          </div>
          {isD&&<div style={{display:'flex',flexDirection:'column',gap:10}}>
            <MetricTile label="Pendiente" value={counts.pendiente} color="var(--sys-amber)"/>
            <MetricTile label="Favoritos" value={counts.favorito} color="var(--sys-red)"/>
            <MetricTile label="Videos" value={counts.video} color="var(--accent)"/>
          </div>}
        </div>
      </div>
    </div>;
  if(embedded)return Body;
  return<div style={{display:'flex',flexDirection:'column',flex:1,minHeight:0,height:'100%'}}>
    <NavHeader eyebrow="CONTENIDO" title="Biblioteca" subtitle={`${items.length} guardados`}/>
    {Body}
  </div>;
}

function AjustesScreen({theme,setTheme,accent,setAccent,onBack,user,onSignOut,signingOut}){

  const[syncing,setSyncing]=useState(false);
  const[syncMsg,setSyncMsg]=useState('');
  const[pwMsg,setPwMsg]=useState('');
  const[editName,setEditName]=useState(false);
  const[nameVal,setNameVal]=useState(userDisplayName(user));
  const[savingName,setSavingName]=useState(false);
  const[importErr,setImportErr]=useState('');

  function setSetting(k,v){setSettings(prev=>({...(prev||{}), [k]:v}));}

  function lastSyncLabel(){
    try{
      const s=localStorage.getItem('zp_last_sync');
      if(!s)return'Nunca';
      const d=new Date(s);
      const diff=Math.floor((Date.now()-d)/1000);
      if(diff<60)return'Hace un momento';
      if(diff<3600)return`Hace ${Math.floor(diff/60)} min`;
      if(diff<86400)return`Hace ${Math.floor(diff/3600)} h`;
      return d.toLocaleDateString('es-ES',{day:'numeric',month:'short'});
    }catch{return'—';}
  }

  async function doSync(){
    if(syncing)return;
    setSyncing(true);setSyncMsg('');
    try{
      if(window.zpForcePush)await window.zpForcePush();
      if(window.zpResync)await window.zpResync();
      setSyncMsg('Sincronizado');
    }catch{setSyncMsg('Error');}
    setSyncing(false);
    setTimeout(()=>setSyncMsg(''),3000);
  }

  function doExport(){
    try{
      const data={};
      for(let i=0;i<localStorage.length;i++){
        const k=localStorage.key(i);
        if(!k||!k.startsWith('zp_'))continue;
        try{data[k]=JSON.parse(localStorage.getItem(k));}catch{data[k]=localStorage.getItem(k);}
      }
      const blob=new Blob([JSON.stringify({exportedAt:new Date().toISOString(),user:user?.email||null,data},null,2)],{type:'application/json'});
      const url=URL.createObjectURL(blob);
      const a=document.createElement('a');a.href=url;a.download=`zuppej-export-${TODAY_KEY}.json`;
      document.body.appendChild(a);a.click();a.remove();
      setTimeout(()=>URL.revokeObjectURL(url),1000);
    }catch(e){console.error('export failed',e);}
  }

  function doImport(){
    const input=document.createElement('input');input.type='file';input.accept='.json,application/json';
    input.onchange=async e=>{
      const file=e.target.files?.[0];if(!file)return;
      try{
        const text=await file.text();
        const obj=JSON.parse(text);
        const data=obj.data||obj;
        let count=0;
        for(const[k,v]of Object.entries(data)){
          if(!k.startsWith('zp_'))continue;
          localStorage.setItem(k,typeof v==='string'?v:JSON.stringify(v));
          count++;
        }
        setImportErr(`✓ ${count} claves importadas. Recarga para aplicar.`);
        setTimeout(()=>window.location.reload(),1500);
      }catch(err){setImportErr('Error al leer el archivo JSON.');}
    };
    input.click();
  }

  function doClearData(){
    if(!window.confirm('¿Borrar todos los datos locales? Esta acción no se puede deshacer.'))return;
    const keys=[];
    for(let i=0;i<localStorage.length;i++){const k=localStorage.key(i);if(k&&k.startsWith('zp_'))keys.push(k);}
    keys.forEach(k=>{if(k!=='zp_auth'&&k!=='zp_auth_remember')localStorage.removeItem(k);});

              {editName
                ?<div style={{display:'flex',gap:8,alignItems:'center'}}>
                  <input autoFocus value={nameVal} onChange={e=>setNameVal(e.target.value)}

                    style={{flex:1,fontSize:15,fontWeight:600,color:'var(--text-1)',background:'var(--fill-1)',
                      border:'none',outline:'none',borderRadius:8,padding:'4px 8px',fontFamily:'inherit'}}/>

      </div>
    </div>
  </div>;
